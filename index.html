<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BackLogs | Work & Study Terminal</title>
    <!-- Bibliotecas e fontes externas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style id="theme-style">
        /* Estilos dinâmicos do motor de skins serão injetados aqui */
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div id="terminal-container">
        <!-- Cabeçalho Principal do App com as Bolinhas Clássicas UNIX e badges da imagem original -->
        <header id="app-header" class="flex items-center justify-between px-4 py-2 bg-[#090d16] border-b border-[#1e293b] select-none shrink-0">
            <div class="flex items-center gap-2">
                <span class="w-3.5 h-3.5 rounded-full bg-[#ef4444]"></span>
                <span class="w-3.5 h-3.5 rounded-full bg-[#eab308]"></span>
                <span class="w-3.5 h-3.5 rounded-full bg-[#22c55e]"></span>
                <span class="text-sm font-semibold ml-2 uppercase tracking-wider flex items-center gap-2 text-[#38bdf8]">
                    <span class="text-[#22c55e] font-mono">&gt;_</span> BACKLOGS @ UNIX V3.4
                </span>
            </div>
            <div class="flex items-center gap-2.5">
                <div id="sync-status" class="text-[11px] font-sans font-semibold px-2.5 py-0.5 rounded-full bg-red-500/10 text-red-500 border border-red-500/30 flex items-center gap-1.5 font-medium">
                    Modo Offline Ativo
                </div>
                <div id="user-display" class="text-[11px] font-mono px-2.5 py-0.5 rounded bg-black/40 text-slate-400 border border-white/10 select-all font-sans">
                    local@antix
                </div>
            </div>
        </header>
        
        <!-- Barra 1 de Atalhos Rápidos (Exibir, Planilha, Backups) -->
        <div id="quick-bar-exibir" class="flex items-center gap-2 px-4 py-2 border-b border-[#1e293b] bg-black/10 overflow-x-auto shrink-0 select-none no-scrollbar text-xs font-mono">
            <span class="text-[#38bdf8] font-bold uppercase shrink-0">EXIBIR:</span>
            <button onclick="executeQuickCommand('tarefas')" class="px-2.5 py-1.5 rounded border border-[#38bdf8]/40 hover:border-[#38bdf8] bg-transparent text-[#38bdf8] flex items-center gap-1 transition-all shrink-0">
                📋 Tarefas (t)
            </button>
            <button onclick="executeQuickCommand('notas')" class="px-2.5 py-1.5 rounded border border-amber-500/40 hover:border-amber-500 bg-transparent text-amber-500 flex items-center gap-1 transition-all shrink-0">
                📝 Notas (n)
            </button>
            <button onclick="executeQuickCommand('prazos')" class="px-2.5 py-1.5 rounded border border-emerald-500/40 hover:border-emerald-500 bg-transparent text-emerald-500 flex items-center gap-1 transition-all shrink-0">
                ⏳ Prazos (p)
            </button>
            <span class="text-slate-500 font-bold uppercase mx-1 shrink-0">MAIS:</span>
            <button onclick="executeQuickCommand('carregar arquivo')" class="px-2.5 py-1.5 rounded border border-green-500/40 hover:border-green-500 bg-transparent text-green-500 flex items-center gap-1 transition-all shrink-0">
                Planilha
            </button>
            <button onclick="executeQuickCommand('importar')" class="px-2.5 py-1.5 rounded border border-purple-500/40 hover:border-purple-500 bg-transparent text-purple-500 flex items-center gap-1 transition-all shrink-0">
                Importar TXT
            </button>
            <button onclick="executeQuickCommand('exportar')" class="px-2.5 py-1.5 rounded border border-indigo-500/40 hover:border-indigo-500 bg-transparent text-indigo-500 flex items-center gap-1 transition-all shrink-0">
                Exportar TXT
            </button>
            <button onclick="executeQuickCommand('ajuda')" class="px-2.5 py-1.5 rounded border border-red-500/40 hover:border-red-500 bg-transparent text-red-500 flex items-center gap-1 transition-all shrink-0">
                Ajuda
            </button>
        </div>

        <!-- Barra 2 de Atalhos de Criação Rápida (Adicionar) -->
        <div id="quick-bar-adicionar" class="flex items-center gap-2 px-4 py-2 border-b border-[#1e293b] bg-black/20 overflow-x-auto shrink-0 select-none no-scrollbar text-xs font-mono">
            <span class="text-emerald-500 font-bold uppercase shrink-0">ADICIONAR:</span>
            <button onclick="triggerQuickAdd('tarefa')" class="px-2.5 py-1.5 rounded border border-emerald-500/40 hover:border-emerald-500 bg-transparent text-emerald-400 flex items-center gap-1 transition-all shrink-0">
                + Criar Tarefa
            </button>
            <button onclick="triggerQuickAdd('nota')" class="px-2.5 py-1.5 rounded border border-amber-500/40 hover:border-amber-500 bg-transparent text-amber-400 flex items-center gap-1 transition-all shrink-0">
                + Criar Nota
            </button>
            <button onclick="triggerQuickAdd('prazo')" class="px-2.5 py-1.5 rounded border border-sky-500/40 hover:border-sky-500 bg-transparent text-sky-400 flex items-center gap-1 transition-all shrink-0">
                + Criar Prazo (Assistente)
            </button>
        </div>
        
        <!-- Área de Exibição do Terminal (Com tabindex para permitir o foco e navegação via setas) -->
        <main id="terminal" tabindex="-1" class="flex-grow overflow-y-auto p-4 space-y-1 select-text"></main>

        <!-- Secção de Notícias Integrada CNN Brasil -->
        <section id="news-section" class="border-t border-white/5 bg-black/10 p-2 select-none shrink-0">
            <h5 id="news-toggle" onclick="toggleNews()" class="flex items-center gap-2 text-xs font-semibold uppercase tracking-wider cursor-pointer hover:opacity-80 transition-all pl-2">
                <i class="fa-solid fa-rss text-red-500"></i> Últimas Notícias - CNN Brasil <span id="news-indicator" class="text-[10px] font-mono">[+]</span>
            </h5>
            <div id="noticias" class="hidden text-xs mt-2 p-2 rounded max-h-32 overflow-y-auto font-mono leading-relaxed bg-black/20">
                Sincronizando feed...
            </div>
        </section>

        <!-- Container de Entrada de Comandos (Estilizado como caixa no rodapé como antes) -->
        <footer id="input-container" class="border-t border-white/5 p-3 bg-black/20 shrink-0 flex items-center gap-2">
            <span class="text-emerald-500 font-bold font-mono select-none">$</span>
            <input type="text" id="input" autofocus placeholder="Digite ajuda para ver os comandos..." autocomplete="off" class="bg-transparent outline-none border-none flex-grow text-sm font-mono">
        </footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // CONFIGURAÇÕES GLOBAIS DE AMBIENTE DO FIREBASE
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'backlogs-b88cd';
        const firebaseConfig = {
            apiKey: "AIzaSyDbG1AVzQf4V-HeyH1MB8Ac8sMgNqmWLR0",
            authDomain: "backlogs-b88cd.firebaseapp.com",
            projectId: "backlogs-b88cd",
            storageBucket: "backlogs-b88cd.firebasestorage.app",
            messagingSenderId: "95227569310",
            appId: "1:95227569310:web:93b8768076a5f91134078f",
            measurementId: "G-WV2G4LBD2E"
        };

        // Inicialização do Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        let currentUser = null;
        let terminalState = "normal";

        // Arrays de memória compartilhada
        const scheduledEvents = [];
        const todoList = [];
        const monthlyDoneList = []; 
        const notesList = [];
        let deadlinesList = []; // CORREÇÃO: Alterado de const para let para permitir reatribuições nativas
        const lastCommands = [];
        
        let commandIndex = 0;
        let awaitingDateInput = false;
        let pomodoroInterval = null;
        let lastActiveView = ""; // EVOLUÇÃO: Rastreador ativo de tela para redesenho reativo em tempo real

        const terminal = document.getElementById("terminal");
        const input = document.getElementById("input");
        const styleTag = document.getElementById("theme-style");
        const syncStatus = document.getElementById("sync-status");
        const userDisplay = document.getElementById("user-display");

        const skins = {
            // Skin 1: UNIX retro limpa (Sem botões, sem bordas esquerdas, fundo flat para linhas do terminal)
            1: { bg: "#090d16", container: "#090d16", text: "#38bdf8", primary: "#38bdf8", inputBg: "#0d1527", border: "#1e293b", lineBg: "transparent", marker: "transparent", hideUI: false, hideButtons: true },
            2: { bg: "#1e1e1e", container: "#252526", text: "#d4d4d4", primary: "#4fc1ff", inputBg: "#333333", border: "#444444", lineBg: "#2d2d2d", marker: "#008b8b", hideUI: false, hideButtons: false },
            3: { bg: "black", container: "#0a0a0a", text: "#00FF00", primary: "#00FF00", inputBg: "#111", border: "#00FF00", lineBg: "#050505", marker: "#00FF00", hideUI: false, hideButtons: false },
            4: { bg: "#121212", container: "#121212", text: "#ffffff", primary: "#ffffff", inputBg: "#121212", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true },
            5: { bg: "#ffffff", container: "#ffffff", text: "#000000", primary: "#000000", inputBg: "#ffffff", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true }, 
            6: { bg: "#0000aa", container: "#0000aa", text: "#ffffff", primary: "#ffffff", inputBg: "#0000aa", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true }, 
            7: { bg: "#1a1a1a", container: "#1a1a1a", text: "#f5f5f7", primary: "#6e6e73", inputBg: "#242426", border: "#333336", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true },
            8: { bg: "#000000", container: "#000000", text: "#39FF14", primary: "#39FF14", inputBg: "#000000", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true }, 
            9: { bg: "#4040E0", container: "#3A3ACC", text: "#A0A0FF", primary: "#A0A0FF", inputBg: "#3A3ACC", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true }, 
            10: { bg: "#204060", container: "#204060", text: "#ffffff", primary: "#ff8000", inputBg: "#1a334d", border: "#ff8000", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true }, 
            11: { bg: "#000000", container: "#000000", text: "#b5b5b5", primary: "#b5b5b5", inputBg: "#000000", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true }, 
            12: { bg: "#050505", container: "#050505", text: "#ffb000", primary: "#ffb000", inputBg: "#050505", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true, hideButtons: true } 
        };

        function applySkin(id) {
            const s = skins[id] || skins[1];
            const isUnix = s.hideUI;
            const hideButtons = s.hideButtons || false;
            
            styleTag.innerHTML = `
                * { box-sizing: border-box; }
                body { 
                    background-color: ${s.bg}; 
                    font-family: ${isUnix ? "'Fira Code', 'Courier New', monospace" : "'Inter', sans-serif"}; 
                    color: ${s.text}; 
                    margin: 0; 
                    padding: 0; 
                    transition: background-color 0.2s, color 0.2s;
                    height: 100dvh;
                    overflow: hidden;
                }
                #terminal-container { 
                    display: flex;
                    flex-direction: column;
                    height: 100dvh;
                    width: 100%;
                    max-width: 900px;
                    margin: 0 auto;
                    background-color: ${s.container};
                    border-left: ${isUnix ? 'none' : `1px solid ${s.border}`};
                    border-right: ${isUnix ? 'none' : `1px solid ${s.border}`};
                    border-bottom: ${isUnix ? 'none' : `3px solid ${s.primary}`};
                }
                #app-header { 
                    background-color: ${s.container};
                    border-bottom: ${isUnix ? 'none' : `1px solid ${s.border}`};
                    display: ${isUnix ? 'none' : 'flex'}; 
                }
                #terminal { 
                    flex: 1 1 auto;
                    padding: 15px; 
                    overflow-y: auto; 
                    font-size: 14px; 
                    line-height: 1.5;
                    font-family: 'Fira Code', 'Courier New', monospace;
                }
                #terminal:focus {
                    outline: none;
                }
                #news-section {
                    display: ${isUnix ? 'none' : 'block'};
                }
                #news-toggle { 
                    color: ${s.primary}; 
                    border-left: 3px solid ${s.primary}; 
                }
                #noticias { 
                    background-color: ${s.lineBg || 'rgba(0,0,0,0.05)'};
                    color: ${s.text};
                }
                #noticias a {
                    color: ${s.primary};
                }
                #input-container { 
                    background-color: ${s.container};
                    border-top: ${isUnix ? 'none' : `1px solid ${s.border}`};
                    padding: 10px 15px 15px 15px;
                }
                .quick-btn {
                    background-color: ${s.inputBg};
                    color: ${s.primary};
                    border: 1px solid ${s.border === 'transparent' ? s.text : s.border};
                    padding: 6px 12px;
                    border-radius: 4px;
                    font-size: 11px;
                    font-weight: bold;
                    cursor: pointer;
                    white-space: nowrap;
                    transition: opacity 0.2s, background-color 0.2s;
                }
                #input { 
                    width: 100%; 
                    background-color: transparent;
                    color: ${s.text}; 
                    font-weight: bold; 
                    caret-color: ${s.primary}; 
                    font-size: 15px;
                }
                .line-item { 
                    border-bottom: ${(isUnix || hideButtons) ? 'none' : `1px solid ${s.border}`}; 
                    padding: ${(isUnix || hideButtons) ? '1px 0' : '6px 0'}; 
                    display: flex; 
                    align-items: center; 
                    justify-content: space-between; 
                    border-left: ${(isUnix || hideButtons) ? 'none' : `5px solid ${s.marker}`}; 
                    padding-left: ${(isUnix || hideButtons) ? '0' : '10px'}; 
                    background-color: ${(isUnix || hideButtons) ? 'transparent' : s.lineBg}; 
                    border-radius: ${(isUnix || hideButtons) ? '0' : '4px'};
                }
                .line-text { 
                    flex-grow: 1; 
                    margin-right: 10px; 
                    word-break: break-word;
                }
                .btn-group { 
                    display: ${(isUnix || hideButtons) ? 'none' : 'flex'}; 
                    gap: 3px;
                }
                .action-btn { 
                    background-color: ${s.inputBg}; 
                    color: ${s.primary}; 
                    font-size: 10px; 
                    border: 1px solid ${s.border === 'transparent' ? s.text : s.border}; 
                    padding: 2px 6px; 
                    cursor: pointer; 
                    border-radius: 3px; 
                    font-weight: bold; 
                    min-width: 20px;
                    min-height: 20px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                }
                table { 
                    border-collapse: collapse; 
                    background: ${isUnix ? 'transparent' : 'white'}; 
                    color: ${s.text}; 
                    margin: 8px 0; 
                    border: 1px solid ${isUnix ? s.text : '#ccc'}; 
                    width: 100%;
                }
                th, td { 
                    border: 1px solid ${isUnix ? s.text : '#ccc'}; 
                    padding: 6px; 
                    text-align: center; 
                    font-size: 12px;
                }
            `;
            localStorage.setItem("selectedSkin", id);
            
            const newsSection = document.getElementById("news-section");
            const quickBarExibir = document.getElementById("quick-bar-exibir");
            const quickBarAdicionar = document.getElementById("quick-bar-adicionar");
            
            if (newsSection) newsSection.style.display = isUnix ? "none" : "block";
            if (quickBarExibir) quickBarExibir.style.display = isUnix ? "none" : "flex";
            if (quickBarAdicionar) quickBarAdicionar.style.display = isUnix ? "none" : "flex";
        }
        window.applySkin = applySkin;

        const initialSkin = localStorage.getItem("selectedSkin") || "1";
        applySkin(initialSkin);

        function saveToLocalStorage() {
            try {
                const localData = {
                    tasksList: todoList,
                    notesList,
                    deadlinesList,
                    scheduledEvents,
                    monthlyDoneList,
                    currentSkin: localStorage.getItem("selectedSkin") || "1"
                };
                localStorage.setItem("backlogs_local_cache", JSON.stringify(localData));
            } catch (e) { console.error("Erro ao cachear:", e); }
        }

        function loadLocalBackup() {
            try {
                const cached = localStorage.getItem("backlogs_local_cache");
                if (cached) {
                    const data = JSON.parse(cached);
                    todoList.length = 0; if (data.tasksList) todoList.push(...data.tasksList);
                    notesList.length = 0; if (data.notesList) notesList.push(...data.notesList);
                    deadlinesList.length = 0; if (data.deadlinesList) deadlinesList.push(...data.deadlinesList);
                    scheduledEvents.length = 0; if (data.scheduledEvents) scheduledEvents.push(...data.scheduledEvents);
                    monthlyDoneList.length = 0; if (data.monthlyDoneList) monthlyDoneList.push(...data.monthlyDoneList);
                    applySkin(data.currentSkin || 1);
                    writeToTerminalWithoutSaving("[SISTEMA] Cache local carregado com sucesso.", "#10b981");
                } else {
                    applySkin(1);
                }
            } catch (e) { console.error("Erro ao ler cache:", e); applySkin(1); }
        }

        function writeToTerminalWithoutSaving(text, color = "") {
            const div = document.createElement("div");
            div.className = "line-item";
            div.innerHTML = `<span class="line-text">${text}</span>
                <div class="btn-group">
                    <button class="action-btn copy-btn">C</button>
                    <button class="action-btn edit-btn">E</button>
                    <button class="action-btn delete-btn" style="color:red">X</button>
                </div>`;
            const lineText = div.querySelector('.line-text');
            if(color) lineText.style.color = color;
            
            div.querySelector('.copy-btn').addEventListener('click', () => {
                const tempInput = document.createElement("input");
                tempInput.value = lineText.innerText.replace(/^\$\s*/, '');
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
            });

            div.querySelector('.delete-btn').addEventListener('click', () => { div.remove(); saveContent(); });
            
            div.querySelector('.edit-btn').addEventListener('click', () => {
                const v = prompt("Editar:", lineText.innerText);
                if (v) { lineText.innerText = v; saveContent(); }
            });

            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }
        window.writeToTerminalWithoutSaving = writeToTerminalWithoutSaving;

        function writeToTerminal(text, color = "") {
            writeToTerminalWithoutSaving(text, color);
            saveContent();
        }
        window.writeToTerminal = writeToTerminal;

        // Monitor de Erros Globais
        window.onerror = function(message, source, lineno, colno, error) {
            writeToTerminalWithoutSaving(`[ERRO CRÍTICO] ${message} (Linha: ${lineno})`, "#ef4444");
            console.error(error);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                userDisplay.textContent = user.email || user.uid;
                updateSyncStatus("synced", "Sincronizado");
                
                const docRef = doc(db, "users_data", user.uid);
                onSnapshot(docRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        
                        todoList.length = 0;
                        if (data.todoList) todoList.push(...data.todoList);
                        else if (data.tasksList) todoList.push(...data.tasksList);

                        notesList.length = 0;
                        if (data.notesList) notesList.push(...data.notesList);

                        deadlinesList.length = 0;
                        if (data.deadlinesList) deadlinesList.push(...data.deadlinesList);

                        scheduledEvents.length = 0;
                        if (data.scheduledEvents) scheduledEvents.push(...data.scheduledEvents);

                        monthlyDoneList.length = 0;
                        if (data.monthlyDoneList) monthlyDoneList.push(...data.monthlyDoneList);

                        if (data.selectedSkin) applySkin(data.selectedSkin);
                        saveToLocalStorage();

                        if (lastActiveView === "tarefas") {
                            terminal.innerHTML = "";
                            writeToTerminalWithoutSaving("$ tarefas");
                            handleTodoList();
                        } else if (lastActiveView === "notas") {
                            terminal.innerHTML = "";
                            writeToTerminalWithoutSaving("$ notas");
                            handleNoteList();
                        } else if (lastActiveView === "prazos") {
                            terminal.innerHTML = "";
                            writeToTerminalWithoutSaving("$ prazos");
                            renderDeadlinesList();
                        }
                    }
                    writeToTerminalWithoutSaving("[SISTEMA] Banco de dados em nuvem carregado e ativo.", "#10b981");
                    checkAndRunAutomations();
                }, (error) => {
                    console.error("Erro ao sincronizar Firestore:", error);
                    writeToTerminalWithoutSaving("[AVISO] Executando em modo local protegido.", "var(--terminal-prompt)");
                });
            } else {
                currentUser = null;
                userDisplay.textContent = "desconectado";
                updateSyncStatus("offline", "Desconectado");
                try {
                    updateSyncStatus("connecting", "Conectando...");
                    await signInAnonymously(auth);
                } catch(e) {
                    currentUser = { uid: "local-user" };
                    userDisplay.textContent = "local@antix";
                    updateSyncStatus("offline", "Modo Offline Ativo");
                }
            }
        });

        async function saveContent() {
            saveToLocalStorage();
            if (!currentUser || currentUser.uid === "local-user") return;
            updateSyncStatus("saving", "Salvando...");
            try {
                const docRef = doc(db, "users_data", currentUser.uid);
                
                const lines = [];
                terminal.querySelectorAll('.line-text').forEach(el => {
                    if(!el.innerHTML.includes("[SISTEMA]") && !el.innerHTML.includes("Sincronizando")) {
                        lines.push({ html: el.innerHTML, color: el.style.color || "" });
                    }
                });

                await setDoc(docRef, {
                    terminalContent: lines,
                    todoList,
                    tasksList: todoList,
                    notesList,
                    deadlinesList,
                    scheduledEvents,
                    monthlyDoneList,
                    selectedSkin: localStorage.getItem("selectedSkin") || "1",
                    updatedAt: new Date().toISOString()
                }, { merge: true });
                updateSyncStatus("synced", "Sincronizado");
            } catch (e) {
                console.error("Erro ao salvar dados:", e);
                updateSyncStatus("offline", "Erro ao salvar na nuvem");
            }
        }

        function updateSyncStatus(status, label) {
            const indicator = document.getElementById("sync-status");
            if (!indicator) return;
            if (status === "synced") {
                indicator.className = "text-[11px] font-sans font-semibold px-2.5 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 flex items-center gap-1.5 font-medium";
                indicator.innerHTML = `<i class="fa-solid fa-cloud-arrow-up text-[10px]"></i> ${label}`;
            } else if (status === "offline") {
                indicator.className = "text-[11px] font-sans font-semibold px-2.5 py-0.5 rounded-full bg-red-500/10 text-red-500 border border-red-500/30 flex items-center gap-1.5";

                indicator.innerHTML = `<i class="fa-solid fa-circle-notch animate-spin text-[10px]"></i> ${label}`;

        function checkAndRunAutomations() {
            if (!currentUser) return;
            const now = new Date();
            const currentMonthYear = `${(now.getMonth() + 1 < 10 ? '0' : '') + (now.getMonth() + 1)}/${now.getFullYear()}`;
            const dayOfWeek = now.getDay(); 

            let stateChanged = false;

            if ([0, 1, 6].includes(dayOfWeek)) { 
                let movedCount = 0;
                for (let i = todoList.length - 1; i >= 0; i--) {
                    if (todoList[i].done || todoList[i].completed) {
                        const completedTask = todoList.splice(i, 1)[0];
                        monthlyDoneList.push({
                            task: completedTask.task || completedTask.text,
                            archiveMonth: currentMonthYear,
                            archivedAt: now.toLocaleDateString('pt-BR')
                        });
                        movedCount++;
                    }
                }
                if (movedCount > 0) {
                    writeToTerminalWithoutSaving(`$ [SISTEMA] Ciclo semanal fechado. ${movedCount} tarefa(s) concluída(s) arquivada(s) no histórico mensal.`);
                    stateChanged = true;
                }
            }

            const fifthBusinessDay = getFifthBusinessDay(now.getFullYear(), now.getMonth());
            if (now.getDate() >= fifthBusinessDay) {
                let clearedCount = 0;
                for (let i = monthlyDoneList.length - 1; i >= 0; i--) {
                    if (monthlyDoneList[i].archiveMonth !== currentMonthYear) {
                        monthlyDoneList.splice(i, 1);
                        clearedCount++;
                    }
                }
                if (clearedCount > 0) {
                    writeToTerminalWithoutSaving(`$ [SISTEMA] 5º dia útil detectado. ${clearedCount} registro(s) do mês anterior limpo(s).`);
                    stateChanged = true;
                }
            }

            if (stateChanged) {
                saveContent();
            }
        }

        function getFifthBusinessDay(year, month) {
            let count = 0; let day = 1;
            while (count < 5) {
                const d = new Date(year, month, day).getDay();
                if (d !== 0 && d !== 6) count++;
                if (count < 5) day++;
            }
            return day;
        }

        const FERIADOS = [
            "01/01", "21/04", "01/05", "07/09", "12/10", "02/11", "15/11", "20/11", "25/12"
        ];

        function isBusinessDay(date) {
            const day = date.getDay();
            if (day === 0 || day === 6) return false;
            const formatted = `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}`;
            if (FERIADOS.includes(formatted)) return false;
            return true;
        }

        function getNextBusinessDay(date) {
            const next = new Date(date.getTime() + 86400000);
            while (!isBusinessDay(next)) {
                next.setTime(next.getTime() + 86400000);
            }
            return next;
        }

        function computeMEJCDeadline(baseDateStr, hasReceived) {
            const dateParts = baseDateStr.split("/");
            if (dateParts.length !== 3) return null;
            const baseDate = new Date(parseInt(dateParts[2], 10), parseInt(dateParts[1], 10) - 1, parseInt(dateParts[0], 10));
            if (isNaN(baseDate.getTime())) return null;

            let startDate;
            if (hasReceived) {
                startDate = getNextBusinessDay(baseDate);
            } else {
                let cur = new Date(baseDate.getTime());
                for (let i = 0; i < 5; i++) {
                    cur = getNextBusinessDay(cur);
                }
                startDate = cur;
            }

            let deadlineDate = new Date(startDate.getTime() + 20 * 86400000);
            while (!isBusinessDay(deadlineDate)) {
                deadlineDate.setTime(deadlineDate.getTime() + 86400000);
            }

            return deadlineDate;
        }

        function triggerExcelImport() {
            writeToTerminalWithoutSaving("[SISTEMA] Seletor de planilhas aberto. Aguardando arquivo...");
            const inputEl = document.createElement("input");
            inputEl.type = "file";
            inputEl.accept = ".xlsx, .xls";
            inputEl.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(data, { type: 'array' });
                        let totalImported = 0;

                        workbook.SheetNames.forEach(sheetName => {
                            const worksheet = workbook.Sheets[sheetName];
                            const rawRows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                            if (rawRows.length === 0) return;

                            let headerRowIndex = -1;
                            let columnsMap = {};

                            for (let r = 0; r < rawRows.length; r++) {
                                const row = rawRows[r];
                                if (!row) continue;
                                const stringRow = row.map(cell => String(cell || '').trim().toUpperCase());
                                if (stringRow.includes("EMPENHO") || stringRow.includes("Nº EMPENHO")) {
                                    headerRowIndex = r;
                                    row.forEach((cell, idx) => {
                                        const val = String(cell || '').trim().toUpperCase();
                                        if (val.includes("EMPENHO")) columnsMap["empenho"] = idx;
                                        if (val.includes("FORNECEDOR")) columnsMap["fornecedor"] = idx;
                                        if (val.includes("RECEBIMENTO")) columnsMap["recebimento"] = idx;
                                        if (val.includes("ENVIO")) columnsMap["envio"] = idx;
                                    });
                                    break;
                                }
                            }

                            if (headerRowIndex !== -1 && columnsMap["empenho"] !== undefined) {
                                for (let r = headerRowIndex + 1; r < rawRows.length; r++) {
                                    const row = rawRows[r];
                                    if (!row || !row[columnsMap["empenho"]]) continue;

                                    const rawEmpenho = String(row[columnsMap["empenho"]]).trim();
                                    let rawFornecedor = columnsMap["fornecedor"] !== undefined ? String(row[columnsMap["fornecedor"]] || 'Desconhecido').trim() : 'Desconhecido';
                                    
                                    rawFornecedor = rawFornecedor.replace(/^\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}\s*-\s*/, '').trim();

                                    const rawRecebimento = columnsMap["recebimento"] !== undefined ? String(row[columnsMap["recebimento"]] || '').trim() : '';
                                    const rawEnvio = columnsMap["envio"] !== undefined ? String(row[columnsMap["envio"]] || '').trim() : '';

                                    let targetDeadline = null;
                                    if (rawRecebimento) {
                                        targetDeadline = computeMEJCDeadline(rawRecebimento, true);
                                    } else if (rawEnvio) {
                                        targetDeadline = computeMEJCDeadline(rawEnvio, false);
                                    }

                                    if (targetDeadline) {
                                        const eventName = `Empenho ${rawEmpenho}`;
                                        if (!deadlinesList.some(d => d.evento === eventName)) {
                                            deadlinesList.push({
                                                expirationTime: targetDeadline.getTime(),
                                                evento: eventName,
                                                agente: rawFornecedor,
                                                resumo: `Importado de Excel. Aba: ${sheetName}.`,
                                                createdAt: new Date().toLocaleDateString('pt-BR')
                                            });
                                            totalImported++;
                                        }
                                    }
                                }
                            }
                        });

                        writeToTerminal(`[SISTEMA] Importação concluída! Gerados ${totalImported} prazo(s) com sucesso.`, "#10b981");
                        if (totalImported > 0) saveContent();
                    } catch (err) {
                        writeToTerminal(`[ERRO] Falha ao ler arquivo: ${err.message}`, "#ef4444");
                    }
                };
                reader.readAsArrayBuffer(file);
            };
            inputEl.click();
        }

        function triggerTxtImport() {
            writeToTerminalWithoutSaving("[SISTEMA] Selecione o arquivo TXT de backup...");
            const inputEl = document.createElement("input");
            inputEl.type = "file";
            inputEl.accept = ".txt";
            inputEl.onchange = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = event => {
                    try {
                        const content = event.target.result;
                        const lines = content.split("\n");
                        let currentMode = "";
                        let importedTasks = 0;
                        let importedNotes = 0;
                        let importedDeadlines = 0;

                        lines.forEach(line => {
                            const trimmed = line.trim();
                            if (!trimmed) return;

                            if (trimmed.includes("=== TAREFAS ===")) { currentMode = "tasks"; return; }
                            if (trimmed.includes("=== NOTAS ===")) { currentMode = "notes"; return; }
                            if (trimmed.includes("=== PRAZOS ===")) { currentMode = "deadlines"; return; }

                            if (currentMode === "tasks") {
                                let done = false;
                                let taskText = trimmed;
                                if (trimmed.startsWith("[X]") || trimmed.startsWith("[x]")) {
                                    done = true;
                                    taskText = trimmed.substring(3).trim();
                                } else if (trimmed.startsWith("[ ]")) {
                                    taskText = trimmed.substring(3).trim();
                                }
                                if (!todoList.some(t => (t.task || t.text).toLowerCase() === taskText.toLowerCase())) {
                                    todoList.push({ task: taskText, done: done });
                                    importedTasks++;
                                }
                            } else if (currentMode === "notes") {
                                let noteText = trimmed.replace(/^-\s*/, '');
                                if (!notesList.some(n => (n.content || n).toLowerCase() === noteText.toLowerCase())) {
                                    notesList.push({ content: noteText, date: new Date().toLocaleDateString('pt-BR') });
                                    importedNotes++;
                                }
                            } else if (currentMode === "deadlines") {
                                const parts = trimmed.split(";").map(p => p.trim());
                                if (parts.length >= 3) {
                                    const expirationTime = parseInt(parts[0], 10);
                                    if (!isNaN(expirationTime)) {
                                        deadlinesList.push({
                                            expirationTime,
                                            evento: parts[1],
                                            agente: parts[2],
                                            resumo: parts[3] || "",
                                            createdAt: parts[4] || new Date().toLocaleDateString('pt-BR')
                                        });
                                        importedDeadlines++;
                                    }
                                }
                            }
                        });

                        writeToTerminal(`[SISTEMA] Importado: ${importedTasks} tarefas, ${importedNotes} notes, ${importedDeadlines} prazos.`, "#10b981");
                        saveContent();
                    } catch (err) {
                        writeToTerminal(`[ERRO] Erro na conversão: ${err.message}`, "#ef4444");
                    }
                };
                reader.readAsText(file);
            };
            inputEl.click();
        }

        function exportData(filename = "backlogs_backup") {
            let data = "=== BACKLOGS - BACKUP COMPLETO ===\n\n";
            data += "=== TAREFAS ===\n";
            todoList.forEach(t => {
                data += `${t.done || t.completed ? '[X]' : '[ ]'} ${t.task || t.text}\n`;
            });
            data += "\n=== NOTAS ===\n";
            notesList.forEach(n => {
                data += `- ${n.content || n}\n`;
            });
            data += "\n=== PRAZOS ===\n";
            deadlinesList.forEach(d => {
                data += `${d.expirationTime} ; ${d.evento} ; ${d.agente} ; ${d.resumo || ''} ; ${d.createdAt}\n`;
            });

            const blob = new Blob([data], { type: "text/plain" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = filename + ".txt";
            a.click();
            writeToTerminal("[SISTEMA] Backup exportado com sucesso!", "#10b981");
        }

        function handleCommand(cmd) {
            let raw = cmd.trim();
            if (!raw) return;

            let lower = raw.toLowerCase();
            
            // RESOLUÇÃO DE TECLAS DE ATALHO DE UMA ÚNICA LETRA (PRODUTIVIDADE)
            if (lower === "t") raw = "tarefas";
            else if (lower === "p") raw = "prazos";
            else if (lower === "n") raw = "notas";
            else if (lower === "l") raw = "limpar";

            terminal.innerHTML = "";
            lastActiveView = "";

            writeToTerminalWithoutSaving(`$ ${raw}`);

            lower = raw.toLowerCase();
            const args = raw.split(" ");
            const primaryCmd = args[0].toLowerCase();

            // AJUDA MANUAL
            if (lower === "ajuda" || lower === "help") {
                displayHelpManual();
                return;
            }

            // LOGIN POR PROVEDOR GOOGLE
            if (lower === "google") {
                writeToTerminalWithoutSaving("$ [SISTEMA] Solicitando login via Google...");
                signInWithPopup(auth, googleProvider).then(() => {
                    writeToTerminalWithoutSaving("$ [SISTEMA] Login concluído via Google!");
                }).catch(err => writeToTerminalWithoutSaving(`$ [ERRO] ${err.message}`));
                return;
            }

            // REGISTRO EMAIL SENHA
            if (lower.startsWith("registrar ")) {
                if (args.length < 3) return writeToTerminalWithoutSaving("$ Uso: registrar [email] [senha]");
                createUserWithEmailAndPassword(auth, args[1], args[2])
                    .then(() => writeToTerminalWithoutSaving("$ [SISTEMA] Conta criada com sucesso!"))
                    .catch(err => writeToTerminalWithoutSaving(`$ [ERRO] ${err.message}`));
                return;
            }

            // LOGIN EMAIL SENHA
            if (lower.startsWith("logar ")) {
                if (args.length < 3) return writeToTerminalWithoutSaving("$ Uso: logar [email] [senha]");
                signInWithEmailAndPassword(auth, args[1], args[2])
                    .then(() => writeToTerminalWithoutSaving("$ [SISTEMA] Conectado com sucesso!"))
                    .catch(err => writeToTerminalWithoutSaving(`$ [ERRO] ${err.message}`));
                return;
            }

            // LOGOUT / SAIR
            if (lower === "sair" || lower === "logout") {
                signOut(auth).then(() => {
                    writeToTerminalWithoutSaving("$ [SISTEMA] Desconectado com sucesso.");
                });
                return;
            }

            // TROCA DE PELE (SKIN)
            if (primaryCmd === "skin") {
                const id = parseInt(args[1], 10);
                if (id >= 1 && id <= 12) {
                    applySkin(id);
                    writeToTerminal(`$ [SISTEMA] Tema alterado para a skin ${id}`);
                } else {
                    writeToTerminalWithoutSaving("$ [SISTEMA] Índice inválido de skin. Escolha entre 1 e 12.");
                }
                return;
            }

            // CALCOLADORA INTEGRADA
            if (primaryCmd === "calc") {
                const expr = raw.substring(5).trim();
                try {
                    const result = Function(`'use strict'; return (${expr})`)();
                    writeToTerminal(`$ Resultado: ${expr} = ${result}`);
                } catch(e) {
                    writeToTerminalWithoutSaving(`$ [ERRO] Conta inválida: ${e.message}`);
                }
                return;
            }

            // LIMPAR TELA E LINHAS INDIVIDUAIS
            if (lower.startsWith("limpar") || lower.startsWith("clear")) {
                const keyword = raw.substring(7).trim();
                if (keyword === "tudo" || !keyword) {
                    terminal.innerHTML = "";
                    saveContent();
                } else {
                    terminal.querySelectorAll('.line-item').forEach(l => {
                        if (l.innerText.toLowerCase().includes(keyword.toLowerCase())) {
                            l.remove();
                        }
                    });
                    saveContent();
                }
                return;
            }

            // MARCADORES DE CORES (VERMELHO / CINZA) COM ATUALIZAÇÃO E EXIBIÇÃO DE LISTA
            if (lower.startsWith("vermelho ")) {
                const word = raw.substring(9).trim();
                handleTodoList();
                handleNoteList();
                
                terminal.querySelectorAll('.line-text').forEach(s => {
                    if (s.innerText.toLowerCase().includes(word.toLowerCase())) {
                        s.style.color = "red";
                    }
                });
                saveContent();
                return;
            }

            if (lower.startsWith("check ") || lower.startsWith("check-cor ")) {
                const word = raw.substring(6).trim();
                const possibleTaskIndex = parseInt(word, 10);
                if (!isNaN(possibleTaskIndex) && possibleTaskIndex > 0) {
                    handleTodoCheck(possibleTaskIndex);
                } else {
                    handleTodoList();
                    handleNoteList();
                    
                    terminal.querySelectorAll('.line-text').forEach(s => {
                        if (s.innerText.toLowerCase().includes(word.toLowerCase())) {
                            s.style.color = "grey";
                        }
                    });
                    saveContent();
                }
                return;
            }

            // AGENDA DE EVENTOS E COMPROMISSOS ESTÁTICOS
            if (lower.startsWith("agenda ")) {
                const match = raw.match(/"([^"]+)" (\d{2}\/\d{2}\/\d{4})/);
                if (match) {
                    scheduledEvents.push({ d: match[1], t: match[2] });
                    writeToTerminal(`$ [AGENDA] Gravado: ${match[1]} (${match[2]})`);
                } else {
                    writeToTerminalWithoutSaving('$ [ERRO] Formato correto: agenda "descrição" dd/mm/aaaa');
                }
                return;
            }

            if (lower === "agenda?" || lower === "agenda") {
                if (scheduledEvents.length === 0) return writeToTerminalWithoutSaving("$ Nossos compromissos de agenda estão vazios.");
                writeToTerminalWithoutSaving("$ --- AGENDA DE COMPROMISSOS COMPILADA ---");
                scheduledEvents.forEach((e, i) => {
                    writeToTerminalWithoutSaving(`  ${i + 1}. [${e.t}] ${e.d}`);
                });
                return;
            }

            // CALENDÁRIO INTERATIVO
            if (lower === "calendario" || lower === "calendar") {
                awaitingDateInput = true;
                writeToTerminalWithoutSaving("$ Digite: ANO MÊS (Ex: 2026 7)");
                return;
            }

            // TIMER DE FOCO POMODORO
            if (lower.startsWith("pomodoro ")) {
                const subCmd = args[1]?.toLowerCase();
                clearInterval(pomodoroInterval);
                if (subCmd === "parar" || subCmd === "pausar") {
                    document.getElementById("app-subtitle").innerText = "| Work & Study";
                    return writeToTerminalWithoutSaving("$ Pomodoro parado.");
                }
                let m = parseInt(args[1], 10) || 25; let s = 0;
                writeToTerminalWithoutSaving(`$ Timer de foco Pomodoro para os próximos ${m} min iniciado.`);
                pomodoroInterval = setInterval(() => {
                    if (s === 0) {
                        if (m === 0) {
                            clearInterval(pomodoroInterval);
                            document.getElementById("app-subtitle").innerText = "| Work & Study";
                            writeToTerminalWithoutSaving("[POMODORO] Fim do ciclo de foco! Hora de descansar um pouco.", "#10b981");
                            return;
                        }
                        m--; s = 59;
                    } else s--;
                    document.getElementById("app-subtitle").innerText = `| Pomodoro: ${m}:${s < 10 ? '0' : ''}${s}`;
                }, 1000);
                return;
            }

            // TAREFAS (ADD / DEL / REATIVAR / LIST) - EVOLUÇÃO: SEMPRE TRAZ A LISTA ATUALIZADA
            if (lower.startsWith("tarefa add ") || lower.startsWith("adicionar tarefa ")) {
                const offset = lower.startsWith("tarefa add ") ? 11 : 17;
                const taskText = raw.substring(offset).trim();
                if (!taskText) return writeToTerminalWithoutSaving("$ Uso correto: adicionar tarefa [texto]");
                todoList.push({ task: taskText, done: false });
                writeToTerminal(`$ [TAREFA] Adicionada com sucesso: "${taskText}"`);
                handleTodoList();
                return;
            }

            if (lower.startsWith("tarefa check ") || lower.startsWith("concluir tarefa ") || lower.startsWith("excluir tarefa ")) {
                if (lower.startsWith("excluir tarefa ")) {
                    const idx = parseInt(args[2], 10) - 1;
                    if (isNaN(idx) || idx < 0 || idx >= todoList.length) return writeToTerminalWithoutSaving("$ [ERRO] Índice inválido.");
                    const removed = todoList.splice(idx, 1);
                    writeToTerminal(`$ [TAREFA] Removida com sucesso: "${removed[0].task || removed[0].text}"`);
                } else {
                    const idxStr = args[args.length - 1];
                    handleTodoCheck(idxStr);
                }
                handleTodoList();
                return;
            }

            // REATIVAR TAREFA CONCLUÍDA POR ENGANO (RETORNA PARA PENDENTE)
            if (lower.startsWith("reativar tarefa ") || lower.startsWith("tarefa reativar ")) {
                const idxStr = args[args.length - 1];
                const idx = parseInt(idxStr, 10) - 1;
                if (isNaN(idx) || idx < 0 || idx >= todoList.length) {
                    return writeToTerminalWithoutSaving("$ [ERRO] Índice de tarefa inválido.");
                }
                todoList[idx].done = false;
                todoList[idx].completed = false;
                writeToTerminal(`$ [TAREFA] Reativada para pendente com sucesso: "${todoList[idx].task || todoList[idx].text}"`);
                handleTodoList();
                return;
            }

            if (lower === "tarefas" || lower === "tarefa") {
                handleTodoList();
                return;
            }

            if (lower === "tarefas concluidas" || lower === "tarefas concluídas") {
                handleMonthlyDoneList();
                return;
            }

            // BLOCO DE NOTAS (ADD / DEL / LIST) - EVOLUÇÃO: SEMPRE TRAZ A LISTA ATUALIZADA
            if (lower.startsWith("nota add ") || lower.startsWith("adicionar nota ")) {
                const offset = lower.startsWith("nota add ") ? 9 : 15;
                const noteText = raw.substring(offset).trim();
                if (!noteText) return writeToTerminalWithoutSaving("$ Uso correto: adicionar nota [texto]");
                notesList.push({ content: noteText, date: new Date().toLocaleDateString('pt-BR') });
                writeToTerminal(`$ [NOTA] Gravada com sucesso!`);
                handleNoteList();
                return;
            }

            if (lower.startsWith("nota del ") || lower.startsWith("excluir nota ")) {
                const idx = parseInt(args[args.length - 1], 10) - 1;
                if (isNaN(idx) || idx < 0 || idx >= notesList.length) return writeToTerminalWithoutSaving("$ [ERRO] Índice de nota inválido.");
                notesList.splice(idx, 1);
                writeToTerminal(`$ [NOTA] Removida com sucesso.`);
                handleNoteList();
                return;
            }

            if (lower === "notas" || lower === "nota") {
                handleNoteList();
                return;
            }

            // MONITORAMENTO DE PRAZOS REGRESSIVOS MEJC - EVOLUÇÃO: SEMPRE TRAZ A LISTA ATUALIZADA
            if (lower.startsWith("prazos")) {
                renderDeadlinesList(args[1]);
                return;
            }

            // ADICIONAR PRAZO REGRESSIVO MANUALMENTE (SEM ASPAS)
            if (lower.startsWith("adicionar prazo ") || lower.startsWith("prazo add ")) {
                const offset = lower.startsWith("prazo add ") ? 10 : 16;
                const fullString = raw.substring(offset).trim();
                const parts = fullString.split(";").map(p => p.trim());
                
                if (parts.length < 3) {
                    return writeToTerminalWithoutSaving("[AVISO] Sintaxe incorreta. Exemplo: adicionar prazo 20d ; Evento ; Agente ; Resumo");
                }

                const timeStr = parts[0];
                const evento = parts[1];
                const agente = parts[2];
                const resumo = parts[3] || "";

                let multiplier = 1000 * 60; 
                let count = parseFloat(timeStr);
                if (timeStr.endsWith("s")) multiplier = 1000;
                else if (timeStr.endsWith("m")) multiplier = 1000 * 60;
                else if (timeStr.endsWith("h")) multiplier = 1000 * 60 * 60;
                else if (timeStr.endsWith("d")) multiplier = 1000 * 60 * 60 * 24;

                const durationMs = count * multiplier;
                if (isNaN(durationMs)) return writeToTerminalWithoutSaving("[AVISO] Tempo inválido de expiração.");

                const expirationTime = Date.now() + durationMs;
                deadlinesList.push({
                    expirationTime,
                    evento,
                    agente,
                    resumo,
                    createdAt: new Date().toLocaleDateString('pt-BR')
                });

                writeToTerminal(`$ [SISTEMA] Novo prazo ativo gerado com sucesso para "${evento}".`);
                renderDeadlinesList();
                return;
            }

            // EXCLUIR PRAZO
            if (lower.startsWith("excluir prazo ") || lower.startsWith("prazo del ")) {
                const offset = lower.startsWith("prazo del ") ? 10 : 14;
                const filterParam = raw.substring(offset).trim().toLowerCase();
                if (filterParam === "expirados") {
                    const before = deadlinesList.length;
                    const now = Date.now();
                    deadlinesList = deadlinesList.filter(d => d.expirationTime > now); // Funciona nativamente com declaração let
                    const removedCount = before - deadlinesList.length;
                    writeToTerminal(`$ [SISTEMA] Processo concluído. Foram apagados ${removedCount} prazo(s) expirados.`);
                } else if (filterParam === "todos" || filterParam === "tudo") {
                    deadlinesList.length = 0;
                    writeToTerminal("$ [SISTEMA] Todos os prazos ativos foram excluídos do sistema.");
                } else {
                    const idx = parseInt(filterParam, 10) - 1;
                    if (isNaN(idx) || idx < 0 || idx >= deadlinesList.length) {
                        return writeToTerminalWithoutSaving("[AVISO] Índice inexistente. Escolha um número válido.");
                    }
                    const removed = deadlinesList.splice(idx, 1);
                    writeToTerminal(`$ [SISTEMA] Prazo "${removed[0].evento}" removido com sucesso.`);
                }
                renderDeadlinesList();
                return;
            }

            // PLANILHA EXCEL
            if (lower === "carregar arquivo") {
                triggerExcelImport();
                return;
            }

            // BACKUP DE ARQUIVOS IMPORTAR / EXPORTAR
            if (lower === "importar") {
                triggerTxtImport();
                return;
            }

            if (lower.startsWith("exportar ")) {
                exportData(raw.substring(9).trim());
                return;
            }

            if (lower === "exportar") {
                exportData();
                return;
            }

            // COMANDO CONFIGURAR FIREBASE
            if (lower === "configurar firebase") {
                terminalState = "awaiting_firebase_config";
                writeToTerminalWithoutSaving("=== CONFIGURAR FIREBASE LOCAL ===");
                writeToTerminalWithoutSaving("Cole seu objeto de configuração do Firebase (or API Key):");
                return;
            }

            // COMANDO NÃO ENCONTRADO
            writeToTerminalWithoutSaving(`[ERRO] Comando não reconhecido: "${primaryCmd}". Digite "ajuda" para ver o manual.`, "var(--terminal-error)");
        }

        function handleTodoCheck(idxStr) {
            const idx = parseInt(idxStr, 10) - 1;
            if (isNaN(idx) || idx < 0 || idx >= todoList.length) return writeToTerminalWithoutSaving("$ [ERRO] Índice de tarefa inválido.");
            todoList[idx].done = !todoList[idx].done;
            todoList[idx].completed = todoList[idx].done;
            writeToTerminalWithoutSaving(`$ [TAREFA] Conclusão updated: "${todoList[idx].task || todoList[idx].text}" para ${todoList[idx].done ? "CONCLUÍDO" : "PENDENTE"}.`);
        }

        function handleTodoList() {
            lastActiveView = "tarefas"; // Marca tarefas como visualização ativa
            checkAndRunAutomations(); 
            if(todoList.length === 0) return writeToTerminalWithoutSaving("$ Lista de tarefas ativa vazia.");
            writeToTerminalWithoutSaving("$ --- TAREFAS ATIVAS NO SISTEMA ---");
            todoList.forEach((t, i) => {
                const label = t.task || t.text;
                const isDone = t.done || t.completed;
                if (isDone) {
                    writeToTerminalWithoutSaving(`  ${i + 1}. <span style="color:#10b981; font-weight: bold;">✔</span> ${label}`, "grey");
                } else {
                    writeToTerminalWithoutSaving(`  ${i + 1}. [PENDENTE] ${label}`);
                }
            });
        }

        function handleMonthlyDoneList() {
            if(monthlyDoneList.length === 0) return writeToTerminalWithoutSaving("$ Histórico mensal concluído vazio.");
            writeToTerminalWithoutSaving("$ --- HISTÓRICO CONCLUÍDO DO MÊS ---");
            monthlyDoneList.forEach((t, i) => {
                writeToTerminalWithoutSaving(`  ${i + 1}. <span style="color:#10b981; font-weight: bold;">✔</span> [${t.archivedAt}] ${t.task || t.text}`, "grey");
            });
        }

        function handleNoteList() {
            lastActiveView = "notas"; // Marca notas como visualização ativa
            if(notesList.length === 0) return writeToTerminalWithoutSaving("$ Bloco de notas vazio.");
            writeToTerminalWithoutSaving("$ --- BLOCO DE NOTAS DO SISTEMA ---");
            notesList.forEach((n, i) => {
                const date = n.date || new Date().toLocaleDateString('pt-BR');
                writeToTerminalWithoutSaving(`  ${i + 1}. [${date}] ${n.content || n}`);
            });
        }

        function renderDeadlinesList(filterType = "") {
            lastActiveView = "prazos"; // Marca prazos como visualização ativa
            let listToRender = [...deadlinesList];
            const now = Date.now();

            listToRender.sort((a, b) => a.expirationTime - b.expirationTime);

            if (filterType === "expirados") {
                listToRender = listToRender.filter(d => d.expirationTime <= now);
                writeToTerminalWithoutSaving("=== LISTANDO SÓ PRAZOS EXPIRADOS ===", "#f43f5e");
            } else if (filterType === "5d") {
                listToRender = listToRender.filter(d => d.expirationTime > now && d.expirationTime <= now + 5 * 86400000);
                writeToTerminalWithoutSaving("=== PRAZOS VENCENDO EM ATÉ 5 DIAS ===", "var(--terminal-prompt)");
            } else if (filterType === "10d") {
                listToRender = listToRender.filter(d => d.expirationTime > now && d.expirationTime <= now + 10 * 86400000);
                writeToTerminalWithoutSaving("=== PRAZOS VENCENDO EM ATÉ 10 DIAS ===", "var(--terminal-prompt)");
            } else if (filterType === "20d") {
                listToRender = listToRender.filter(d => d.expirationTime > now && d.expirationTime <= now + 20 * 86400000);
                writeToTerminalWithoutSaving("=== PRAZOS VENCENDO EM ATÉ 20 DIAS ===", "var(--terminal-prompt)");
            } else {
                writeToTerminalWithoutSaving("=== MONITOR DE PRAZOS ATIVOS ===", "var(--terminal-prompt)");
            }

            if (listToRender.length === 0) {
                writeToTerminalWithoutSaving("Nenhum prazo correspondente encontrado para este filtro.", "var(--terminal-text)");
                return;
            }

            listToRender.forEach((d) => {
                const diff = d.expirationTime - now;
                const isOverdue = diff <= 0;
                
                let timeRemainingLabel = "";
                if (isOverdue) {
                    const overdueDays = Math.ceil(Math.abs(diff) / 86400000);
                    timeRemainingLabel = `EXPIRADO HÁ ${overdueDays} DIA(S)! ⚠️`;
                } else {
                    const leftDays = Math.ceil(diff / 86400000);
                    timeRemainingLabel = `${leftDays} dia(s) restante(s)`;
                }

                const realIndex = deadlinesList.findIndex(dl => dl.expirationTime === d.expirationTime && dl.evento === d.evento) + 1;
                const logColor = isOverdue ? "#f43f5e" : "var(--terminal-text)";

                writeToTerminalWithoutSaving(`[${realIndex}] EVENTO: ${d.evento}`, logColor);
                writeToTerminalWithoutSaving(`    AGENTE: ${d.agente} | RESTANTE: ${timeRemainingLabel}`, logColor);
                if (d.resumo) writeToTerminalWithoutSaving(`    RESUMO: ${d.resumo}`, "rgba(255,255,255,0.4)");
                writeToTerminalWithoutSaving(`-------------------------------------------------`, "rgba(255,255,255,0.08)");
            });
        }

        function displayHelpManual() {
            writeToTerminalWithoutSaving(`
                <strong>Manual Completo de Comandos (BackLogs UNIX Híbrido):</strong><br>
                - <strong>google</strong>: Autenticação via conta Google.<br>
                - <strong>registrar [email] [senha]</strong>: Cria uma conta nova.<br>
                - <strong>logar [email] [senha]</strong>: Conecta com seu e-mail e senha.<br>
                - <strong>sair</strong>: Desconecta a conta de usuário atual.<br>
                - <strong>skin [1-12]</strong>: Troca o layout do terminal.<br>
                <br>
                ⚡ <strong>ATALHOS RÁPIDOS DE LETRA ÚNICA:</strong><br>
                - <strong>t</strong>: Atalho para listar as suas tarefas.<br>
                - <strong>p</strong>: Atalho para listar todos os prazos.<br>
                - <strong>n</strong>: Atalho para ver as notas de texto.<br>
                - <strong>l</strong>: Atalho para limpar a tela do terminal.<br>
                <br>
                📋 <strong>GERENCIAMENTO DE TAREFAS:</strong><br>
                - <strong>adicionar tarefa [texto]</strong> ou <strong>tarefa add [texto]</strong>: Adiciona tarefa pendente.<br>
                - <strong>excluir tarefa [nº]</strong> ou <strong>tarefa check [nº]</strong>: Exclui a tarefa pendente pelo índice.<br>
                - <strong>concluir tarefa [nº]</strong> ou <strong>tarefa check [nº]</strong>: Conclui tarefa (Renderiza ✔ em verde).<br>
                - <strong>reativar tarefa [nº]</strong> ou <strong>tarefa reativar [nº]</strong>: Retorna a tarefa concluída para pendente.<br>
                - <strong>tarefas</strong>: Ver tarefas ativas (Auto-limpeza Fim de Semana).<br>
                - <strong>tarefas concluidas</strong>: Histórico mensal (Auto-limpeza no 5º dia útil).<br>
                <br>
                📝 <strong>BLOCO DE NOTAS:</strong><br>
                - <strong>adicionar nota [texto]</strong> ou <strong>nota add [texto]</strong>: Cria anotação rápida.<br>
                - <strong>excluir nota [nº]</strong> ou <strong>nota del [nº]</strong>: Exclui a nota pelo índice.<br>
                - <strong>notas</strong>: Ver bloco de notas completo.<br>
                <br>
                ⌛ <strong>CRONÔMETROS E PRAZOS (MEJC):</strong><br>
                - <strong>adicionar prazo [tempo] ; [evento] ; [agente] ; [resumo]</strong> ou <strong>prazo add [tempo] ; [evento] ; [agente] ; [resumo]</strong>: Adiciona prazo regressivo.<br>
                - <strong>excluir prazo [nº]</strong> ou <strong>prazo del [nº]</strong>: Remove cronômetro.<br>
                - <strong>prazos</strong>: Lista todos os cronômetros ativos da MEJC.<br>
                <br>
                🛠️ <strong>OUTROS COMANDOS:</strong><br>
                - <strong>carregar arquivo</strong>: Importa arquivos Excel (.xlsx) de empenhos.<br>
                - <strong>pomodoro [minutos]</strong>: Temporizador Pomodoro integrado.<br>
                - <strong>pomodoro parar</strong>: Para temporizador Pomodoro.<br>
                - <strong>agenda "descrição" dd/mm/aaaa</strong>: Agenda eventos futuros.<br>
                - <strong>agenda?</strong>: Mostra agenda cadastrada.<br>
                - <strong>calc [expressão]</strong>: Calculadora integrada de matemática.<br>
                - <strong>calendario</strong>: Renderizador de calendário interativo.<br>
                - <strong>check [palavra]</strong>: Colore as linhas que contêm a palavra de cinza.<br>
                - <strong>vermelho [palavra]</strong>: Colore as linhas com a palavra de vermelho.<br>
                - <strong>limpar [palavra]</strong>: Exclui linhas com a palavra correspondente.<br>
                - <strong>limpar tudo</strong>: Reseta todo o visual do terminal de texto.<br>
                - <strong>importar</strong> / <strong>exportar</strong>: Importa e exporta backups em formato TXT.
            `);
        }

        window.executeQuickCommand = function(cmd) {
            if (cmd === 'F2') {
                const n = new Date();
                const formattedDate = `${(n.getDate() < 10 ? '0' : '') + n.getDate()}/${((n.getMonth() + 1) < 10 ? '0' : '') + (n.getMonth() + 1)} ${n.getHours()}:${(n.getMinutes() < 10 ? '0' : '') + n.getMinutes()} `;
                input.value += formattedDate;
                input.focus();
            } else {
                handleCommand(cmd);
                lastCommands.push(cmd);
                commandIndex = lastCommands.length;
            }
        };

        window.cycleSkins = function() {
            let current = parseInt(localStorage.getItem("selectedSkin") || "1", 10);
            let next = current + 1;
            if (next > 12) next = 1;
            applySkin(next);
            writeToTerminalWithoutSaving(`$ [SISTEMA] Skin alterada para o tema ${next}`);
        };

        window.toggleNews = function() {
            const d = document.getElementById("noticias");
            const indicator = document.getElementById("news-indicator");
            const isShown = d.style.display === "block";
            d.style.display = isShown ? "none" : "block";
            indicator.textContent = isShown ? "[+]" : "[-]";
            if (!isShown) {
                d.innerHTML = "Sincronizando feed...";
                fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.cnnbrasil.com.br/feed/')}`)
                    .then(r => r.json())
                    .then(data => {
                        let h = '<ul class="list-disc pl-4 space-y-1">';
                        data.items.slice(0, 5).forEach(i => {
                            h += `<li><a href="${i.link}" class="hover:underline transition-all" target="_blank">${i.title}</a></li>`;
                        });
                        d.innerHTML = h + '</ul>';
                    }).catch(() => {
                        d.innerHTML = "Falha ao sincronizar notícias da CNN Brasil. Verifique a sua conexão.";
                    });
            }
        }
        window.toggleNews = toggleNews;

        function triggerQuickAdd(type) {
            if (!currentUser) {
                writeToTerminalWithoutSaving("[ERRO] Comando bloqueado. Aguardando inicialização do sistema...", "#ef4444");
                return;
            }
            if (type === 'tarefa') {
                const val = prompt("Qual a nova tarefa que deseja adicionar?");
                if (val && val.trim()) {
                    handleCommand(`adicionar tarefa ${val.trim()}`);
                }
            } else if (type === 'nota') {
                const val = prompt("Digite o texto da nova nota:");
                if (val && val.trim()) {
                    handleCommand(`adicionar nota ${val.trim()}`);
                }
            } else if (type === 'prazo') {
                const tempo = prompt("Qual o tempo regressivo? (Ex: 20d, 10h, 30m):");
                if (!tempo || !tempo.trim()) return;
                const evento = prompt("Qual o nome do evento / empenho?");
                if (!evento || !evento.trim()) return;
                const agente = prompt("Qual o agente / fornecedor?");
                if (!agent || !agente.trim()) return;
                const resumo = prompt("Descrição / resumo (Opcional):") || "";
                
                const cmd = `adicionar prazo ${tempo.trim()} ; ${evento.trim()} ; ${agente.trim()} ; ${resumo.trim()}`;
                handleCommand(cmd);
            }
        }
        window.triggerQuickAdd = triggerQuickAdd;

        document.addEventListener("click", (e) => {
            // Se clicar na área do terminal, dá foco a ele para usar as setas direcionais para rolar o conteúdo
            if (e.target.closest('#terminal')) {
                terminal.focus();
            } else if (e.target.closest('#input-container') || e.target.closest('#quick-bar-exibir') || e.target.closest('#quick-bar-adicionar') || e.target.closest('#app-header') || e.target.closest('#news-section')) {
                input.focus();
            } else {
                input.focus();
            }
        });

        // Se o usuário começar a digitar enquanto o terminal está selecionado para leitura, o foco volta para o input
        terminal.addEventListener("keydown", (e) => {
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                input.focus();
                input.value += e.key;
                e.preventDefault();
            } else if (e.key === "Backspace" || e.key === "Enter") {
                input.focus();
            }
        });

        input.addEventListener("keydown", function(e) {
            if (e.key === "ArrowUp") {
                commandIndex = Math.max(0, commandIndex - 1);
                input.value = lastCommands[commandIndex] || "";
            } else if (e.key === "ArrowDown") {
                commandIndex = Math.min(lastCommands.length, commandIndex + 1);
                input.value = lastCommands[commandIndex] || "";
            } else if (e.key === "Enter") {
                const cmd = input.value; input.value = "";
                if (!cmd.trim()) return;

                if (awaitingDateInput) {
                    const parts = cmd.split(" ");
                    displayCustomCalendar(parts[0], parts[1]);
                    awaitingDateInput = false;
                } else {
                    handleCommand(cmd);
                }

                if (cmd.startsWith("logar ") || cmd.startsWith("registrar ")) {
                    const parts = cmd.split(" ");
                    lastCommands.push(`${parts[0]} ${parts[1]} *******`);
                } else { 
                    lastCommands.push(cmd); 
                }
                commandIndex = lastCommands.length;
            }
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "F2") {
                const n = new Date();
                input.value += `${n.getDate()}/${n.getMonth()+1} ${n.getHours()}:${n.getMinutes()} `;
            }
        });

        // Inicialização do Sistema
        window.onload = function() {
            writeToTerminalWithoutSaving("=================================================", "var(--terminal-prompt)");
            writeToTerminalWithoutSaving("   SISTEMA DE GESTÃO DE BACKLOGS - COMPATIVEL UNIX", "var(--terminal-prompt)");
            writeToTerminalWithoutSaving("   Digite 'ajuda' para listar todos os comandos.", "var(--terminal-text)");
            writeToTerminalWithoutSaving("=================================================", "var(--terminal-prompt)");
            loadLocalBackup();
        };

    </script>
