<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BackLogs | Work & Study</title>
    <style id="theme-style">
        /* Estilos injetados pelo JavaScript */
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="app-header" style="padding: 10px 0 0 7.5%; font-weight: bold; font-size: 20px; letter-spacing: 2px;">
            BACKLOGS <span id="app-subtitle" style="font-weight: normal; font-size: 12px;">| Work & Study</span>
        </div>
        <div id="terminal"></div>
        <input type="text" id="input" autofocus placeholder="Digite ajuda para ver os comandos...">
    </div>

    <h5 id="news-toggle" onclick="toggleNews()" style="cursor: pointer; user-select: none;">
        Últimas Notícias - CNN Brasil <span id="news-indicator">[+]</span>
    </h5>
    <div id="noticias" style="display: none; padding-bottom: 50px;">Sincronizando feed...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDbG1AVzQf4V-HeyH1MB8Ac8sMgNqmWLR0",
        authDomain: "backlogs-b88cd.firebaseapp.com",
        projectId: "backlogs-b88cd",
        storageBucket: "backlogs-b88cd.firebasestorage.app",
        messagingSenderId: "95227569310",
        appId: "1:95227569310:web:93b8768076a5f91134078f",
        measurementId: "G-WV2G4LBD2E"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    let currentUser = null;

    const terminal = document.getElementById("terminal");
    const input = document.getElementById("input");
    const styleTag = document.getElementById("theme-style");
    
    const scheduledEvents = [];
    const todoList = [];
    const monthlyDoneList = []; 
    const notesList = [];
    const lastCommands = [];
    let commandIndex = 0;
    let awaitingDateInput = false;
    let pomodoroInterval = null;

    const skins = {
        1: { bg: "#F0F2f5", container: "white", text: "#2c3e50", primary: "#1a2a6c", inputBg: "#f8f9fa", border: "#dee2e6", lineBg: "#fafafa", marker: "#006400", hideUI: false },
        2: { bg: "#1e1e1e", container: "#252526", text: "#d4d4d4", primary: "#4fc1ff", inputBg: "#333333", border: "#444444", lineBg: "#2d2d2d", marker: "#008b8b", hideUI: false },
        3: { bg: "black", container: "#0a0a0a", text: "#00FF00", primary: "#00FF00", inputBg: "#111", border: "#00FF00", lineBg: "#050505", marker: "#00FF00", hideUI: false },
        4: { bg: "#121212", container: "#121212", text: "#ffffff", primary: "#ffffff", inputBg: "#121212", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true },
        5: { bg: "#ffffff", container: "#ffffff", text: "#000000", primary: "#000000", inputBg: "#ffffff", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true }, 
        6: { bg: "#0000aa", container: "#0000aa", text: "#ffffff", primary: "#ffffff", inputBg: "#0000aa", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true }, 
        7: { bg: "#1a1a1a", container: "#1a1a1a", text: "#f5f5f7", primary: "#6e6e73", inputBg: "#242426", border: "#333336", lineBg: "transparent", marker: "transparent", hideUI: true },
        8: { bg: "#000000", container: "#000000", text: "#39FF14", primary: "#39FF14", inputBg: "#000000", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true }, 
        9: { bg: "#4040E0", container: "#3A3ACC", text: "#A0A0FF", primary: "#A0A0FF", inputBg: "#3A3ACC", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true }, 
        10: { bg: "#204060", container: "#204060", text: "#ffffff", primary: "#ff8000", inputBg: "#1a334d", border: "#ff8000", lineBg: "transparent", marker: "transparent", hideUI: true }, 
        11: { bg: "#000000", container: "#000000", text: "#b5b5b5", primary: "#b5b5b5", inputBg: "#000000", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true }, 
        12: { bg: "#050505", container: "#050505", text: "#ffb000", primary: "#ffb000", inputBg: "#050505", border: "transparent", lineBg: "transparent", marker: "transparent", hideUI: true } 
    };

    window.applySkin = function(id) {
        const s = skins[id] || skins[1];
        const isUnix = s.hideUI;
        styleTag.innerHTML = `
            body { background-color: ${s.bg}; font-family: ${isUnix ? "'Courier New', Courier, monospace" : "'Segoe UI', Tahoma, sans-serif"}; color: ${s.text}; margin: 0; padding: 0; transition: 0.3s; }
            #terminal-container { position: relative; height: 85vh; background-color: ${s.container}; border-bottom: ${isUnix ? 'none' : `3px solid ${s.primary}`}; }
            #app-header { color: ${s.primary}; display: ${isUnix ? 'none' : 'block'}; }
            #terminal { width: 85%; margin: 0 auto; padding: 20px; background-color: ${s.container}; color: ${s.text}; position: absolute; top: ${isUnix ? '10px' : '45px'}; bottom: 60px; overflow: auto; font-size: 14px; }
            #input { width: 85%; padding: 15px; background-color: ${s.inputBg}; color: ${s.text}; border: none; border-top: ${isUnix ? 'none' : `1px solid ${s.border}`}; position: absolute; bottom: 0; left: 7.5%; outline: none; font-weight: bold; font-family: inherit; caret-color: ${s.primary}; }
            h5 { margin-left: 7.5%; color: ${s.primary}; margin-top: 15px; font-size: 16px; border-left: 5px solid ${s.primary}; padding-left: 10px; display: ${isUnix ? 'none' : 'block'}; }
            .line-item { border-bottom: ${isUnix ? 'none' : `1px solid ${s.border}`}; padding: ${isUnix ? '3px 0' : '8px 0'}; display: flex; align-items: center; justify-content: space-between; border-left: ${isUnix ? 'none' : `8px solid ${s.marker}`}; padding-left: ${isUnix ? '0' : '15px'}; margin-bottom: 5px; background-color: ${s.lineBg}; }
            .line-text { flex-grow: 1; margin-right: 10px; }
            .btn-group { display: ${isUnix ? 'none' : 'flex'}; }
            .action-btn { background-color: ${s.inputBg}; color: ${s.primary}; font-size: 10px; border: 1px solid ${s.border}; padding: 4px 8px; cursor: pointer; border-radius: 4px; font-weight: bold; margin-left: 4px; }
            #noticias { width: 85%; margin: 0 auto; display: ${isUnix ? 'none !important' : 'none'}; }
            table { border-collapse: collapse; background: ${isUnix ? 'transparent' : 'white'}; color: ${s.text}; margin: 10px 0; border: 1px solid ${isUnix ? s.text : '#ccc'}; }
            th, td { border: 1px solid ${isUnix ? s.text : '#ccc'}; padding: 5px; text-align: center; }
        `;
        localStorage.setItem("selectedSkin", id);
        const toggleBtn = document.getElementById("news-toggle");
        if (toggleBtn) toggleBtn.style.display = isUnix ? "none" : "block";
    }
    
    applySkin(localStorage.getItem("selectedSkin") || 1);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            terminal.innerHTML = "";
            writeToTerminalWithoutSaving(`$ [SISTEMA] Sincronizando dados de: ${user.email}...`);
            await loadUserData(user.uid);
            checkAndRunAutomations(); 
        } else {
            currentUser = null;
            terminal.innerHTML = "";
            writeToTerminalWithoutSaving("$ [SISTEMA] Desconectado. Comandos: registrar email senha | logar email senha | google");
        }
    });

    async function saveContent() {
        if (!currentUser) return;
        const lines = [];
        terminal.querySelectorAll('.line-text').forEach(el => {
            if(!el.innerHTML.includes("[SISTEMA]") && !el.innerHTML.includes("Sincronizando")) {
                lines.push({ html: el.innerHTML, color: el.style.color || "" });
            }
        });
        try {
            await setDoc(doc(db, "users_data", currentUser.uid), {
                terminalContent: lines,
                scheduledEvents, todoList, monthlyDoneList, notesList,
                selectedSkin: localStorage.getItem("selectedSkin") || "1"
            });
        } catch (e) { console.error(e); }
    }

    async function loadUserData(uid) {
        try {
            const docRef = doc(db, "users_data", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                terminal.innerHTML = "";
                writeToTerminalWithoutSaving(`$ Conectado: ${currentUser.email}`);
                
                if(data.terminalContent) data.terminalContent.forEach(l => writeToTerminalWithoutSaving(l.html, l.color));
                
                scheduledEvents.length = 0;
                if(data.scheduledEvents) scheduledEvents.push(...data.scheduledEvents);
                
                todoList.length = 0;
                if(data.todoList) todoList.push(...data.todoList);
                
                monthlyDoneList.length = 0;
                if(data.monthlyDoneList) monthlyDoneList.push(...data.monthlyDoneList);
                
                notesList.length = 0;
                if(data.notesList) notesList.push(...data.notesList);
                
                if(data.selectedSkin) applySkin(data.selectedSkin);
            }
        } catch (err) {
            console.error("Erro ao carregar dados:", err);
        }
    }

    // --- AUTOMACÕES REFINADAS: JANELA DE LIMPEZA (SÁBADO A SEGUNDA) ---
    function checkAndRunAutomations() {
        if (!currentUser) return;
        const now = new Date();
        const currentMonthYear = `${(now.getMonth() + 1 < 10 ? '0' : '') + (now.getMonth() + 1)}/${now.getFullYear()}`;
        const dayOfWeek = now.getDay(); 

        let stateChanged = false;

        // 1. Faxina de Virada de Semana (Sábado, Domingo ou Segunda)
        if ([0, 1, 6].includes(dayOfWeek)) { 
            let movedCount = 0;
            for (let i = todoList.length - 1; i >= 0; i--) {
                if (todoList[i].done) {
                    const completedTask = todoList.splice(i, 1)[0];
                    monthlyDoneList.push({
                        task: completedTask.task,
                        archiveMonth: currentMonthYear,
                        archivedAt: now.toLocaleDateString('pt-BR')
                    });
                    movedCount++;
                }
            }
            if (movedCount > 0) {
                writeToTerminalWithoutSaving(`$ [SISTEMA] Ciclo semanal fechado. ${movedCount} tarefa(s) concluída(s) arquivada(s) no histórico mensal.`);
                stateChanged = true;
            }
        }

        // 2. Regra do 5º Dia Útil
        const fifthBusinessDay = getFifthBusinessDay(now.getFullYear(), now.getMonth());
        if (now.getDate() >= fifthBusinessDay) {
            let clearedCount = 0;
            for (let i = monthlyDoneList.length - 1; i >= 0; i--) {
                if (monthlyDoneList[i].archiveMonth !== currentMonthYear) {
                    monthlyDoneList.splice(i, 1);
                    clearedCount++;
                }
            }
            if (clearedCount > 0) {
                writeToTerminalWithoutSaving(`$ [SISTEMA] 5º dia útil detectado. ${clearedCount} registro(s) do mês anterior limpo(s).`);
                stateChanged = true;
            }
        }

        if (stateChanged) {
            saveContent();
        }
    }

    function getFifthBusinessDay(year, month) {
        let count = 0; let day = 1;
        while (count < 5) {
            const d = new Date(year, month, day).getDay();
            if (d !== 0 && d !== 6) count++;
            if (count < 5) day++;
        }
        return day;
    }

    // --- INTERPRETADOR DE COMANDOS ---
    function handleCommand(cmd) {
        const args = cmd.split(" ");
        const primaryCmd = args[0];

        if (cmd === "ajuda") displayHelpManual();
        else if (cmd === "google") handleGoogleLogin();
        else if (cmd.startsWith("registrar ")) handleRegister(cmd);
        else if (cmd.startsWith("logar ")) handleLogin(cmd);
        else if (cmd === "sair") handleLogout();
        else if (primaryCmd === "skin") applySkin(args[1]);
        else if (cmd.startsWith("calc ")) calculateSum(cmd.substring(5));
        else if (cmd === "limpar tudo") { terminal.innerHTML = ""; saveContent(); }
        else if (cmd.startsWith("limpar ")) deleteByKeyword(cmd.substring(7));
        else if (cmd.startsWith("vermelho ")) colorLine(cmd.substring(9), "red");
        else if (cmd.startsWith("check ")) colorLine(cmd.substring(6), "grey"); 
        else if (cmd.startsWith("exportar ")) saveToFile(cmd.substring(9)); 
        else if (cmd.startsWith("agenda ")) handleSched(cmd); 
        else if (cmd === "agenda?") showSched();
        else if (cmd === "calendario") { awaitingDateInput = true; writeToTerminalWithoutSaving("$ Digite: ANO MÊS"); }
        else if (cmd.startsWith("pomodoro ")) handlePomodoro(args[1]);
        else if (cmd === "pomodoro parar") handlePomodoro("parar");
        else if (cmd.startsWith("tarefa add ")) handleTodoAdd(cmd.substring(11));
        else if (cmd.startsWith("tarefa check ")) handleTodoCheck(args[2]);
        else if (cmd === "tarefas") handleTodoList();
        else if (cmd === "tarefas concluidas") handleMonthlyDoneList();
        else if (cmd.startsWith("nota add ")) handleNoteAdd(cmd.substring(9));
        else if (cmd.startsWith("nota del ")) handleNoteDelete(args[2]);
        else if (cmd === "notas") handleNoteList();
        else {
            if (!currentUser) writeToTerminalWithoutSaving("$ [ERRO] Faça login.");
            else writeToTerminal(cmd);
        }
    }

    function writeToTerminal(text, color = "") { writeToTerminalWithoutSaving(text, color); saveContent(); }

    function writeToTerminalWithoutSaving(text, color = "") {
        const div = document.createElement("div");
        div.className = "line-item";
        div.innerHTML = `<span class="line-text">${text}</span>
            <div class="btn-group">
                <button class="action-btn copy-btn">C</button>
                <button class="action-btn edit-btn">E</button>
                <button class="action-btn delete-btn" style="color:red">X</button>
            </div>`;
        const lineText = div.querySelector('.line-text');
        if(color) lineText.style.color = color;
        div.querySelector('.copy-btn').addEventListener('click', () => navigator.clipboard.writeText(lineText.innerText));
        div.querySelector('.delete-btn').addEventListener('click', () => { div.remove(); saveContent(); });
        div.querySelector('.edit-btn').addEventListener('click', () => {
            const v = prompt("Editar:", lineText.innerText); if (v) { lineText.innerText = v; saveContent(); }
        });
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function handleTodoAdd(task) {
        if(!task) return;
        todoList.push({ task: task, done: false });
        writeToTerminal(`$ [TAREFA] Adicionada: "${task}"`);
    }

    // --- MANIPULAÇÃO DO CHECK (TO-DO) ---
    function handleTodoCheck(idxStr) {
        const idx = parseInt(idxStr) - 1;
        if(isNaN(idx) || !todoList[idx]) return writeToTerminalWithoutSaving("$ [ERRO] Índice inválido.");
        todoList[idx].done = true;
        writeToTerminal(`$ [TAREFA] Concluída: "${todoList[idx].task}"`);
    }

    function handleTodoList() {
        checkAndRunAutomations(); 
        if(todoList.length === 0) return writeToTerminalWithoutSaving("$ Lista de tarefas ativa vazia.");
        writeToTerminalWithoutSaving("$ --- TAREFAS ATIVAS ---");
        todoList.forEach((t, i) => {
            writeToTerminalWithoutSaving(`${i + 1}. ${t.done ? "[FEITO]" : "[PENDENTE]"} ${t.task}`, t.done ? "grey" : "");
        });
    }

    function handleMonthlyDoneList() {
        if(monthlyDoneList.length === 0) return writeToTerminalWithoutSaving("$ Histórico mensal vazio.");
        writeToTerminalWithoutSaving("$ --- HISTÓRICO CONCLUÍDO DO MÊS ---");
        monthlyDoneList.forEach((t, i) => writeToTerminalWithoutSaving(`${i + 1}. [${t.archivedAt}] ${t.task}`, "grey"));
    }

    function handleNoteAdd(c) {
        if(!c) return;
        notesList.push({ content: c, date: new Date().toLocaleDateString('pt-BR') });
        writeToTerminal(`$ [NOTA] Gravada!`);
    }

    function handleNoteDelete(idxStr) {
        const idx = parseInt(idxStr) - 1;
        if(isNaN(idx) || !notesList[idx]) return writeToTerminalWithoutSaving("$ [ERRO] Índice inválido.");
        notesList.splice(idx, 1);
        writeToTerminal(`$ [NOTA] Removida.`);
    }

    function handleNoteList() {
        if(notesList.length === 0) return writeToTerminalWithoutSaving("$ Nenhuma nota.");
        writeToTerminalWithoutSaving("$ --- BLOCO DE NOTAS ---");
        notesList.forEach((n, i) => writeToTerminalWithoutSaving(`${i + 1}. [${n.date}] ${n.content}`));
    }

    function handlePomodoro(p) {
        clearInterval(pomodoroInterval);
        if(p === "parar") return writeToTerminalWithoutSaving("$ Pomodoro parado.");
        let m = parseInt(p) || 25; let s = 0;
        writeToTerminalWithoutSaving(`$ Timer de ${m} min iniciado.`);
        pomodoroInterval = setInterval(() => {
            if (s === 0) {
                if (m === 0) {
                    clearInterval(pomodoroInterval);
                    writeToTerminal("$ Concluído!"); alert("Fim do Pomodoro!"); return;
                }
                m--; s = 59;
            } else s--;
            document.getElementById("app-subtitle").innerText = `| Pomodoro: ${m}:${s < 10 ? '0' : ''}${s}`;
        }, 1000);
    }

    function calculateSum(e) { try { writeToTerminal(`$ Resultado: ${e} = ${Function(`'use strict'; return (${e})`)()}`); } catch(err) { console.error(err); } }
    function handleSched(cmd) { const m = cmd.match(/"([^"]+)" (\d{2}\/\d{2}\/\d{4})/); if (m) { scheduledEvents.push({ d: m[1], t: m[2] }); writeToTerminal(`$ Agendado: ${m[1]}`); } }
    function showSched() { scheduledEvents.forEach(e => writeToTerminalWithoutSaving(`$ ${e.d} (${e.t})`)); }
    function deleteByKeyword(k) { terminal.querySelectorAll('.line-item').forEach(l => { if (l.innerText.includes(k)) l.remove(); }); saveContent(); }
    function colorLine(k, c) { terminal.querySelectorAll('.line-text').forEach(s => { if (s.innerText.includes(k)) s.style.color = c; }); saveContent(); }
    function saveToFile(n) { const b = new Blob([terminal.innerText], { type: "text/plain" }); const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = (n || "backlogs") + ".txt"; a.click(); }

    function displayCustomCalendar(y, m) {
        const year = parseInt(y); const month = parseInt(m);
        let cal = `<table><tr><th colspan="7">${year}-${month}</th></tr><tr><th>D</th><th>S</th><th>T</th><th>Q</th><th>Q</th><th>S</th><th>S</th></tr>`;
        const start = new Date(year, month - 1, 1).getDay(); const total = new Date(year, month, 0).getDate();
        let curr = 1; let r = '<tr>';
        for (let i = 0; i < start; i++) r += '<td></td>';
        for (let i = start; i < 7; i++) { if (curr <= total) { r += `<td>${curr}</td>`; curr++; } }
        r += '</tr>'; cal += r;
        while (curr <= total) {
            r = '<tr>';
            for (let i = 0; i < 7; i++) { if (curr <= total) { r += `<td>${curr}</td>`; curr++; } else r += '<td></td>'; }
            r += '</tr>'; cal += r;
        }
        writeToTerminal(`${cal}</table>`);
    }

    async function handleRegister(cmd) { const p = cmd.split(" "); try { await createUserWithEmailAndPassword(auth, p[1], p[2]); writeToTerminalWithoutSaving("$ Sucesso!"); } catch(e) { console.error(e); } }
    async function handleLogin(cmd) { const p = cmd.split(" "); try { await signInWithEmailAndPassword(auth, p[1], p[2]); } catch(e) { writeToTerminalWithoutSaving("$ Erro login."); } }
    async function handleGoogleLogin() { try { await signInWithPopup(auth, googleProvider); } catch(e) { console.error(e); } }
    async function handleLogout() { try { await signOut(auth); } catch(e) { console.error(e); } }

    function displayHelpManual() {
        writeToTerminalWithoutSaving(`
            <strong>Manual de Comandos (BackLogs BR):</strong><br>
            - <strong>google</strong>: Login com a conta Google<br>
            - <strong>registrar email senha</strong>: Cria uma nova conta<br>
            - <strong>logar email senha</strong>: Conecta ao seu perfil<br>
            - <strong>sair</strong>: Desconecta a conta atual<br>
            - <strong>skin [1-12]</strong>: Troca o tema (4: Unix Dark, 5: Unix Light, 8: Matrix, 11: DOS)<br>
            - <strong>nota add [texto]</strong>: Adiciona anotação rápida ao Bloco de Notas<br>
            - <strong>nota del [nº]</strong>: Deleta nota permanentemente da lista<br>
            - <strong>notas</strong>: Ver todas as suas notas salvas na nuvem<br>
            - <strong>tarefa add [texto]</strong>: Cria nova tarefa semanal<br>
            - <strong>tarefa check [nº]</strong>: Conclui tarefa (Ativa o histórico)<br>
            - <strong>tarefas</strong>: Ver tarefas ativas (Auto-limpeza Sábado-Segunda 🧹)<br>
            - <strong>tarefas concluidas</strong>: Histórico do mês (Auto-limpeza no 5º dia útil)<br>
            - <strong>pomodoro [min]</strong>: Timer de foco (Ex: pomodoro 25)<br>
            - <strong>pomodoro parar</strong>: Para temporizador ativo<br>
            - <strong>agenda "descrição" dd/mm/aaaa</strong>: Agenda compromissos<br>
            - <strong>agenda?</strong>: Mostra eventos agendados<br>
            - <strong>calc [expressão]</strong>: Executa contas matemáticas<br>
            - <strong>calendario</strong>: Renderiza o calendário<br>
            - <strong>check [palavra]</strong>: Colore linha com a palavra de cinza (feito)<br>
            - <strong>vermelho [palavra]</strong>: Colore linha de vermelho<br>
            - <strong>limpar palavra</strong>: Remove linhas que contenham a palavra<br>
            - <strong>limpar tudo</strong>: Reseta a tela do terminal gráfico<br>
            - <strong>exportar [nome]</strong>: Baixa o log em .txt
        `);
    }

    input.addEventListener("keydown", function(e) {
        if (e.key === "ArrowUp") {
            commandIndex = Math.max(0, commandIndex - 1);
            input.value = lastCommands[commandIndex] || "";
        } else if (e.key === "ArrowDown") {
            commandIndex = Math.min(lastCommands.length, commandIndex + 1);
            input.value = lastCommands[commandIndex] || "";
        } else if (e.key === "Enter") {
            const cmd = input.value; input.value = "";
            if (!cmd.trim()) return;
            if (awaitingDateInput) {
                const parts = cmd.split(" ");
                displayCustomCalendar(parts[0], parts[1]);
                awaitingDateInput = false;
            } else {
                handleCommand(cmd);
            }
            if (cmd.startsWith("logar ") || cmd.startsWith("registrar ")) {
                const parts = cmd.split(" ");
                lastCommands.push(`${parts[0]} ${parts[1]} *******`);
            } else { lastCommands.push(cmd); }
            commandIndex = lastCommands.length;
        }
    });

    document.addEventListener("keydown", (e) => {
        if (e.key === "F2") {
            const n = new Date();
            input.value += `${n.getDate()}/${n.getMonth()+1} ${n.getHours()}:${n.getMinutes()} `;
        }
    });

    window.toggleNews = function() {
        const d = document.getElementById("noticias"); d.style.display = d.style.display === "block" ? "none" : "block";
        if (d.style.display === "block") {
            fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent('https://www.cnnbrasil.com.br/feed/')}`)
                .then(r => r.json()).then(data => {
                    let h = '<ul>'; data.items.slice(0, 5).forEach(i => h += `<li><a href="${i.link}" target="_blank">${i.title}</a></li>`);
                    d.innerHTML = h + '</ul>';
                });
        }
    }
</script>
</body>
</html>
