        localStorage.setItem("selectedSkin", id);

    applySkin(localStorage.getItem("selectedSkin") || 1);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            terminal.innerHTML = "";
            writeToTerminalWithoutSaving(`$ [SISTEMA] Sincronizando dados de: ${user.email}...`);
            await loadUserData(user.uid);
            checkAndRunAutomations(); 
        } else {
            currentUser = null;
            terminal.innerHTML = "";
            writeToTerminalWithoutSaving("$ [SISTEMA] Desconectado. Comandos: registrar email senha | logar email senha | google");

    });

    async function saveContent() {
        if (!currentUser) return;
        const lines = [];
        terminal.querySelectorAll('.line-text').forEach(el => {
            if(!el.innerHTML.includes("[SISTEMA]") && !el.innerHTML.includes("Sincronizando")) {
                lines.push({ html: el.innerHTML, color: el.style.color || "" });
            }
        });
        try {
            await setDoc(doc(db, "users_data", currentUser.uid), {
                terminalContent: lines,
                scheduledEvents, todoList, monthlyDoneList, notesList, deadlinesList,
                selectedSkin: localStorage.getItem("selectedSkin") || "1"
            });
        } catch (e) { console.error(e); }
    }

    async function loadUserData(uid) {
        try {
            const docRef = doc(db, "users_data", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                terminal.innerHTML = "";
                writeToTerminalWithoutSaving(`$ Conectado: ${currentUser.email}`);
                
                if(data.terminalContent) data.terminalContent.forEach(l => writeToTerminalWithoutSaving(l.html, l.color));
                
                scheduledEvents.length = 0;
                if(data.scheduledEvents) scheduledEvents.push(...data.scheduledEvents);
                
                todoList.length = 0;
                if(data.todoList) todoList.push(...data.todoList);
                
                monthlyDoneList.length = 0;
                if(data.monthlyDoneList) monthlyDoneList.push(...data.monthlyDoneList);
                
                notesList.length = 0;
                if(data.notesList) notesList.push(...data.notesList);

                deadlinesList.length = 0;
                if(data.deadlinesList) deadlinesList.push(...data.deadlinesList);
                
                if(data.selectedSkin) applySkin(data.selectedSkin);
            }
        } catch (err) {
            console.error("Erro ao carregar dados:", err);
        }
    }

    function checkAndRunAutomations() {
        if (!currentUser) return;
        const now = new Date();
        const currentMonthYear = `${(now.getMonth() + 1 < 10 ? '0' : '') + (now.getMonth() + 1)}/${now.getFullYear()}`;
        const dayOfWeek = now.getDay(); 

        let stateChanged = false;

        if ([0, 1, 6].includes(dayOfWeek)) { 
            let movedCount = 0;
            for (let i = todoList.length - 1; i >= 0; i--) {
                if (todoList[i].done) {
                    const completedTask = todoList.splice(i, 1)[0];
                    monthlyDoneList.push({
                        task: completedTask.task,
                        archiveMonth: currentMonthYear,
                        archivedAt: now.toLocaleDateString('pt-BR')
                    });
                    movedCount++;
                }
            }
            if (movedCount > 0) {
                writeToTerminalWithoutSaving(`$ [SISTEMA] Ciclo semanal fechado. ${movedCount} tarefa(s) concluída(s) arquivada(s) no histórico mensal.`);
                stateChanged = true;
            }
        }

        const fifthBusinessDay = getFifthBusinessDay(now.getFullYear(), now.getMonth());
        if (now.getDate() >= fifthBusinessDay) {
            let clearedCount = 0;
            for (let i = monthlyDoneList.length - 1; i >= 0; i--) {
                if (monthlyDoneList[i].archiveMonth !== currentMonthYear) {
                    monthlyDoneList.splice(i, 1);
                    clearedCount++;
                }
            }
            if (clearedCount > 0) {
                writeToTerminalWithoutSaving(`$ [SISTEMA] 5º dia útil detectado. ${clearedCount} registro(s) do mês anterior limpo(s).`);
                stateChanged = true;
            }
        }

        if (stateChanged) {
            saveContent();
        }
    }

    function getFifthBusinessDay(year, month) {
        let count = 0; let day = 1;
        while (count < 5) {
            const d = new Date(year, month, day).getDay();
            if (d !== 0 && d !== 6) count++;
            if (count < 5) day++;
        }
        return day;
    }

    function isBusinessDay(date) {
        const day = date.getDay();
        if (day === 0 || day === 6) return false; // Fim de semana
        
        const formatted = `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}`;
        // Feriados Nacionais Brasileiros Básicos + Consciência Negra (20/11)
        const holidays = [
            "01/01", // Ano Novo
            "21/04", // Tiradentes
            "01/05", // Dia do Trabalho
            "07/09", // Independência
            "12/10", // Padroeira do Brasil
            "02/11", // Finados
            "15/11", // Proclamação da República
            "20/11", // Consciência Negra
            "25/12"  // Natal
        ];
        return !holidays.includes(formatted);
    }

    function getNextBusinessDay(date) {
        let d = new Date(date);
        do {
            d.setDate(d.getDate() + 1);
        } while (!isBusinessDay(d));
        return d;
    }

    function addBusinessDays(date, days) {
        let d = new Date(date);
        let added = 0;
        while (added < days) {
            d.setDate(d.getDate() + 1);
            if (isBusinessDay(d)) {
                added++;
            }
        }
        return d;
    }

    function handleCommand(cmd) {
        const args = cmd.split(" ");
        const primaryCmd = args[0];

        if (cmd === "ajuda") displayHelpManual();
        else if (cmd === "google") handleGoogleLogin();
        else if (cmd.startsWith("registrar ")) handleRegister(cmd);
        else if (cmd.startsWith("logar ")) handleLogin(cmd);
        else if (cmd === "sair") handleLogout();
        else if (primaryCmd === "skin") applySkin(args[1]);
        else if (cmd.startsWith("calc ")) calculateSum(cmd.substring(5));
        else if (cmd === "limpar tudo") { terminal.innerHTML = ""; saveContent(); }
        else if (cmd.startsWith("limpar ")) deleteByKeyword(cmd.substring(7));
        else if (cmd.startsWith("vermelho ")) colorLine(cmd.substring(9), "red");
        else if (cmd.startsWith("check ")) colorLine(cmd.substring(6), "grey"); 
        else if (cmd.startsWith("exportar ")) saveToFile(cmd.substring(9)); 
        else if (cmd.startsWith("agenda ")) handleSched(cmd); 
        else if (cmd === "agenda?") showSched();
        else if (cmd === "calendario") { awaitingDateInput = true; writeToTerminalWithoutSaving("$ Digite: ANO MÊS"); }
        else if (cmd.startsWith("pomodoro ")) handlePomodoro(args[1]);
        else if (cmd === "pomodoro parar") handlePomodoro("parar");
        
        // Comando Excel
        else if (cmd === "carregar arquivo") { excelFileInput.click(); writeToTerminalWithoutSaving("$ [SISTEMA] Seletor de planilhas aberto. Aguardando arquivo..."); }
        
        // Novos Comandos de Prazos Gerais (Utilizando Ponto e Vírgula para separar em Evento / Agente / Resumo)
        else if (cmd.startsWith("prazo add ")) handleDeadlineAdd(cmd.substring(10));
        else if (cmd.startsWith("prazo del ")) {
            const param = cmd.substring(10).trim();
            if (param === "expirados") {
                handleDeadlineDeleteExpired();
            } else {
                handleDeadlineDelete(args[2]);
            }
        }
        else if (primaryCmd === "prazos") {
            const filter = args[1] || "";
            handleDeadlineList(filter);
        }

        // Comandos de Tarefas e Notas
        else if (cmd.startsWith("tarefa add ")) handleTodoAdd(cmd.substring(11));
        else if (cmd.startsWith("tarefa check ")) handleTodoCheck(args[2]);
        else if (cmd === "tarefas") handleTodoList();
        else if (cmd === "tarefas concluidas") handleMonthlyDoneList();
        else if (cmd.startsWith("nota add ")) handleNoteAdd(cmd.substring(9));
        else if (cmd.startsWith("nota del ")) handleNoteDelete(args[2]);
        else if (cmd === "notas") handleNoteList();
        else {
            if (!currentUser) writeToTerminalWithoutSaving("$ [SISTEMA] Faça login.");
            else writeToTerminal(cmd);
        }
    }

    window.executeQuickCommand = function(cmd) {
        const inputEl = document.getElementById("input");
        if (cmd === 'F2') {
            const n = new Date();
            const formattedDate = `${(n.getDate() < 10 ? '0' : '') + n.getDate()}/${((n.getMonth() + 1) < 10 ? '0' : '') + (n.getMonth() + 1)} ${n.getHours()}:${(n.getMinutes() < 10 ? '0' : '') + n.getMinutes()} `;
            inputEl.value += formattedDate;
            inputEl.focus();
        } else {
            inputEl.value = cmd;
            handleCommand(cmd);
            inputEl.value = "";
            lastCommands.push(cmd);
            commandIndex = lastCommands.length;
        }
    };

    window.cycleSkins = function() {
        let currentSkin = parseInt(localStorage.getItem("selectedSkin") || "1");
        let nextSkin = currentSkin + 1;
        if (nextSkin > 12) nextSkin = 1;
        applySkin(nextSkin);
        writeToTerminalWithoutSaving(`$ [SISTEMA] Skin alterada para o tema ${nextSkin}`);
    };

    function writeToTerminal(text, color = "") { writeToTerminalWithoutSaving(text, color); saveContent(); }

    function writeToTerminalWithoutSaving(text, color = "") {
        const div = document.createElement("div");
        div.className = "line-item";
        div.innerHTML = `<span class="line-text">${text}</span>
            <div class="btn-group">
                <button class="action-btn copy-btn">C</button>
                <button class="action-btn edit-btn">E</button>
                <button class="action-btn delete-btn" style="color:red">X</button>
            </div>`;
        const lineText = div.querySelector('.line-text');
        if(color) lineText.style.color = color;
        div.querySelector('.copy-btn').addEventListener('click', () => {
            document.execCommand('copy');
            navigator.clipboard.writeText(lineText.innerText).catch(() => {});
        });
        div.querySelector('.delete-btn').addEventListener('click', () => { div.remove(); saveContent(); });
        div.querySelector('.edit-btn').addEventListener('click', () => {
            const v = prompt("Editar:", lineText.innerText); if (v) { lineText.innerText = v; saveContent(); }
        });
        terminal.appendChild(div);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function handleDeadlineAdd(rawParam) {
        const parts = rawParam.split(";").map(p => p.trim());
        
        if (parts.length < 4) {
            return writeToTerminalWithoutSaving("$ [ERRO] Formato correto: prazo add tempo ; Evento ; Agente ; Resumo (Use ponto e vírgula para separar as seções)");
        }

        const durationStr = parts[0];
        const evento = parts[1];
        const agente = parts[2];
        const resumo = parts[3];

        let totalSeconds = 0;
        let cleanParam = durationStr.toLowerCase();
        
        if (cleanParam.endsWith("s")) {
            totalSeconds = parseInt(cleanParam) || 10;
        } else if (cleanParam.endsWith("h")) {
            totalSeconds = (parseInt(cleanParam) || 1) * 3600;
        } else if (cleanParam.endsWith("d")) {
            totalSeconds = (parseInt(cleanParam) || 1) * 86400;
        } else {
            totalSeconds = (parseInt(cleanParam) || 25) * 60; // Padrão minutos
        }

        const now = new Date();
        const expirationTime = now.getTime() + (totalSeconds * 1000);

        deadlinesList.push({
            evento,
            agente,

    function handleDeadlineDeleteExpired() {
        const now = new Date().getTime();
        const initialLength = deadlinesList.length;
        
        for (let i = deadlinesList.length - 1; i >= 0; i--) {
            if (deadlinesList[i].expirationTime <= now) {
                deadlinesList.splice(i, 1);
            }
        }
        const deletedCount = initialLength - deadlinesList.length;
        writeToTerminal(`$ [SISTEMA] Limpeza concluída. ${deletedCount} prazo(s) expirado(s) removido(s) definitivamente.`);
    }

    function handleDeadlineList(filter = "") {
        if(deadlinesList.length === 0) return writeToTerminalWithoutSaving("$ Nenhum prazo ou evento monitorado no momento.");
        
        const now = new Date().getTime();
        const filterStr = filter ? filter.trim().toLowerCase() : "";

        // Criando mapeamento de tempo restante em segundos
        let calculatedList = deadlinesList.map((d, index) => {
            const timeLeft = Math.max(0, Math.floor((d.expirationTime - now) / 1000));
            return { ...d, timeLeft, originalIndex: index };
        });

        // Filtragem Inteligente
        if (filterStr === "expirados") {
            calculatedList = calculatedList.filter(d => d.timeLeft <= 0);
        } else if (filterStr === "5d") {
            calculatedList = calculatedList.filter(d => d.timeLeft > 0 && d.timeLeft <= 5 * 86400);
        } else if (filterStr === "10d") {
            calculatedList = calculatedList.filter(d => d.timeLeft > 0 && d.timeLeft <= 10 * 86400);
        } else if (filterStr === "20d") {
            calculatedList = calculatedList.filter(d => d.timeLeft > 0 && d.timeLeft <= 20 * 86400);
        } else if (filterStr !== "") {
            return writeToTerminalWithoutSaving(`$ [ERRO] Filtro inválido. Use: prazos [expirados / 5d / 10d / 20d]`);
        }

        if (calculatedList.length === 0) {
            return writeToTerminalWithoutSaving(`$ Nenhum prazo correspondente ao filtro "${filterStr}" no momento.`);
        }

        // Ordenação inteligente: expirados sempre em cima, depois mais urgentes
        calculatedList.sort((a, b) => {
            if (a.timeLeft === 0 && b.timeLeft === 0) return a.expirationTime - b.expirationTime;
            if (a.timeLeft === 0) return -1;
            if (b.timeLeft === 0) return 1;
            return a.timeLeft - b.timeLeft;
        });

        const filterLabel = filterStr ? `[FILTRO: ${filterStr.toUpperCase()}]` : "[TODOS]";
        writeToTerminalWithoutSaving(`$ --- MONITORAMENTO DE PRAZOS ATIVOS ${filterLabel} ---`);
        
        calculatedList.forEach((d) => {
            let timeString = "";
            if (d.timeLeft <= 0) {
                timeString = "❌ PRAZO EXPIRADO!";
            } else {
                let days = Math.floor(d.timeLeft / 86400);
                let hours = Math.floor((d.timeLeft % 86400) / 3600);
                let mins = Math.floor((d.timeLeft % 3600) / 60);
                let secs = d.timeLeft % 60;
                
                if (days > 0) timeString += `${days}d `;
                if (hours > 0 || days > 0) timeString += `${hours}h `;
                if (mins > 0 || hours > 0 || days > 0) timeString += `${mins}m `;
                timeString += `${secs}s`;
            }

            const output = `<strong>[ID: ${d.originalIndex + 1}]</strong> Evento: ${d.evento}<br>` +
                           `   • Agente: ${d.agente}<br>` +
                           `   • Resumo: ${d.resumo}<br>` +
                           `   • Registrado em: ${d.createdAt}<br>` +
                           `   • Tempo Restante: <span style="color: #ff8000; font-weight: bold;">${timeString}</span>`;
            
            writeToTerminalWithoutSaving(output, d.timeLeft <= 0 ? "#ff0000" : "");
        });
    }

    function handlePomodoro(p) {
        clearInterval(pomodoroInterval);
        if(p === "parar") {
            document.getElementById("app-subtitle").innerText = "| Work & Study";
            return writeToTerminalWithoutSaving("$ Pomodoro parado.");
        }
        
        let totalSeconds = 0;
        let cleanParam = p.trim().toLowerCase();
        
        if (cleanParam.endsWith("s")) {
            totalSeconds = parseInt(cleanParam) || 10;
        } else if (cleanParam.endsWith("h")) {
            totalSeconds = (parseInt(cleanParam) || 1) * 3600;
        } else if (cleanParam.endsWith("d")) {
            totalSeconds = (parseInt(cleanParam) || 1) * 86400;
        } else {
            totalSeconds = (parseInt(cleanParam) || 25) * 60;
        }
        
        writeToTerminalWithoutSaving(`$ Temporizador de ${p} iniciado. Foco total!`);
        
        pomodoroInterval = setInterval(() => {
            if (totalSeconds <= 0) {
                clearInterval(pomodoroInterval);
                writeToTerminal("$ [SISTEMA] Temporizador do Pomodoro finalizado! Bom trabalho."); 
                document.getElementById("app-subtitle").innerText = "| Work & Study";
                return;
            }
            totalSeconds--;
            
            let d = Math.floor(totalSeconds / 86400);
            let h = Math.floor((totalSeconds % 86400) / 3600);
            let m = Math.floor((totalSeconds % 3600) / 60);
            let s = totalSeconds % 60;
            
            let timeString = "";
            if (d > 0) timeString += `${d}d `;
            if (h > 0 || d > 0) timeString += `${h}h `;
            timeString += `${m}:${s < 10 ? '0' : ''}${s}`;
            
            document.getElementById("app-subtitle").innerText = `| Pomodoro: ${timeString}`;
        }, 1000);
    }

    function displayCustomCalendar(y, m) {
        const year = parseInt(y); const month = parseInt(m);
        let cal = `<table><tr><th colspan="7">${year}-${month}</th></tr><tr><th>D</th><th>S</th><th>T</th><th>Q</th><th>Q</th><th>S</th><th>S</th></tr>`;
        const start = new Date(year, month - 1, 1).getDay(); const total = new Date(year, month, 0).getDate();
        let curr = 1; let r = '<tr>';
        for (let i = 0; i < start; i++) r += '<td></td>';
        for (let i = start; i < 7; i++) { if (curr <= total) { r += `<td>${curr}</td>`; curr++; } }
        r += '</tr>'; cal += r;
        while (curr <= total) {
            r = '<tr>';
            for (let i = 0; i < 7; i++) { if (curr <= total) { r += `<td>${curr}</td>`; curr++; } else r += '<td></td>'; }
            r += '</tr>'; cal += r;
        }
        writeToTerminal(`${cal}</table>`);
    }

    function safeParseDate(value) {
        if (!value) return null;
        if (value instanceof Date) {
            return isNaN(value.getTime()) ? null : value;
        }
        
        const slashRegex = /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/;
        const matchSlash = String(value).trim().match(slashRegex);
        if (matchSlash) {
            return new Date(parseInt(matchSlash[3], 10), parseInt(matchSlash[2], 10) - 1, parseInt(matchSlash[1], 10));
        }

        const dashRegex = /^(\d{4})-(\d{1,2})-(\d{1,2})$/;
        const matchDash = String(value).trim().match(dashRegex);
        if (matchDash) {
            return new Date(parseInt(matchDash[1], 10), parseInt(matchDash[2], 10) - 1, parseInt(matchDash[3], 10));
        }

        const numericVal = Number(value);
        if (!isNaN(numericVal) && numericVal > 30000 && numericVal < 60000) {
            return new Date((numericVal - 25569) * 86400 * 1000);
        }

        const standardParsed = new Date(value);
        return isNaN(standardParsed.getTime()) ? null : standardParsed;
    }

    function processExcelData(records, sheetName) {
        let addedCount = 0;
        let ignoredCount = 0;
        
        writeToTerminalWithoutSaving(`$ [PLANILHA] Analisando aba [${sheetName}] com ${records.length} linha(s)...`);

        records.forEach((row, idx) => {
            let empenhoCol = null;
            let fornecedorCol = null;
            let confirmacaoCol = null;
            let envioCol = null;

            Object.keys(row).forEach(key => {
                const k = key.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Remove acentos
                if (k.includes("empenho") || k === "n empenho" || k === "numero" || k === "cod") {
                    empenhoCol = key;
                } else if (k.includes("fornecedor") || k.includes("razao") || k === "agente" || k === "empresa") {
                    fornecedorCol = key;
                } else if (k.includes("confirma") || k.includes("recebimento") || k.includes("recebi")) {
                    confirmacaoCol = key;
                } else if (k.includes("envio") || k.includes("enviado") || k.includes("data de envio")) {
                    envioCol = key;
                }
            });

            if (!empenhoCol || !fornecedorCol) {
                ignoredCount++;
                return;
            }

            const empenhoVal = String(row[empenhoCol]).trim();
            const fornecedorVal = String(row[fornecedorCol]).trim();
            if (!empenhoVal || !fornecedorVal || empenhoVal === "undefined" || fornecedorVal === "undefined" || empenhoVal === "" || fornecedorVal === "") {
                ignoredCount++;
                return;
            }

            // Remove CNPJ e caracteres adicionais do nome do fornecedor
            let cleanFornecedor = fornecedorVal;
            if (fornecedorVal.includes(" - ")) {
                const parts = fornecedorVal.split(" - ");
                if (/\d{2}\.\d{3}\.\d{3}\/\d{4}-\d{2}/.test(parts[0]) || /^\d+$/.test(parts[0].replace(/[\.\/\-]/g, ""))) {
                    cleanFornecedor = parts.slice(1).join(" - ").trim();
                }
            }

            const dateConfirmacao = confirmacaoCol ? safeParseDate(row[confirmacaoCol]) : null;
            const dateEnvio = envioCol ? safeParseDate(row[envioCol]) : null;

            let startBaseDate = null;
            let logMethod = "";

            if (dateConfirmacao) {
                startBaseDate = getNextBusinessDay(dateConfirmacao);
                logMethod = `Confirmado em ${dateConfirmacao.toLocaleDateString('pt-BR')}`;
            } else if (dateEnvio) {
                const estimatedArrival = addBusinessDays(dateEnvio, 5);
                startBaseDate = getNextBusinessDay(estimatedArrival);
                logMethod = `Enviado em ${dateEnvio.toLocaleDateString('pt-BR')} (Est. 5 dias úteis)`;
            } else {
                startBaseDate = getNextBusinessDay(new Date());
                logMethod = "Sem data de envio/confirmação (Início hoje)";
            }

            let endCalculatedDate = new Date(startBaseDate);
            endCalculatedDate.setDate(endCalculatedDate.getDate() + 20);

            while (!isBusinessDay(endCalculatedDate)) {
                endCalculatedDate.setDate(endCalculatedDate.getDate() + 1);
            }

            deadlinesList.push({
                evento: `Empenho ${empenhoVal}`,
                agente: cleanFornecedor,
                resumo: `Gerado de forma automática via planilha MEJC (${sheetName}). Metodologia: ${logMethod}.`,
                expirationTime: endCalculatedDate.getTime(),
                createdAt: new Date().toLocaleDateString('pt-BR')
            });

            addedCount++;
        });

        return { addedCount, ignoredCount };
    }

    excelFileInput.addEventListener("change", function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(evt) {
            try {
                const data = new Uint8Array(evt.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                let totalAdded = 0;
                let totalIgnored = 0;
                let sheetsFound = 0;

                writeToTerminalWithoutSaving(`$ [PLANILHA] Lendo arquivo: ${file.name}...`);

                workbook.SheetNames.forEach(sheetName => {
                    const worksheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1 });
                    let headerIdx = -1;
                    
                    for (let i = 0; i < rows.length; i++) {
                        if (rows[i] && rows[i].some(cell => String(cell).toLowerCase().includes("empenho"))) {
                            headerIdx = i;
                            break;
                        }
                    }

                    if (headerIdx === -1) {
                        return;
                    }

                    sheetsFound++;
                    const headers = rows[headerIdx].map(h => String(h || "").trim());
                    const jsonData = [];

                    for (let i = headerIdx + 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row || row.length === 0) continue;

                        const hasData = row.some(cell => cell !== undefined && cell !== null && String(cell).trim() !== "");
                        if (!hasData) continue;

                        const record = {};
                        headers.forEach((header, colIdx) => {
                            if (header) {
                                record[header] = row[colIdx];
                            }
                        });
                        jsonData.push(record);
                    }

                    if (jsonData.length > 0) {
                        const result = processExcelData(jsonData, sheetName);
                        totalAdded += result.addedCount;
                        totalIgnored += result.ignoredCount;
                    }
                });

                if (sheetsFound === 0) {
                    writeToTerminalWithoutSaving(`$ [ERRO PLANILHA] Não foi possível identificar os cabeçalhos de Empenho em nenhuma aba do arquivo.`, "#ff0000");
                } else {
                    writeToTerminal(`$ [PLANILHA CONCLUÍDA] Importados com sucesso das abas identificadas: ${totalAdded} prazo(s). Ignorados/Inválidos: ${totalIgnored}.`);
                }
            } catch (err) {
                writeToTerminalWithoutSaving(`$ [ERRO EXCEL] Falha ao ler a planilha: ${err.message}`, "#ff0000");
            }
        };
        reader.readAsArrayBuffer(file);
    });

    input.addEventListener("keydown", function(e) {
        if (e.key === "ArrowUp") {
            commandIndex = Math.max(0, commandIndex - 1);
            input.value = lastCommands[commandIndex] || "";
        } else if (e.key === "ArrowDown") {
            commandIndex = Math.min(lastCommands.length, commandIndex + 1);
            input.value = lastCommands[commandIndex] || "";
        } else if (e.key === "Enter") {
            const cmd = input.value; input.value = "";
            if (!cmd.trim()) return;
            if (awaitingDateInput) {
                const parts = cmd.split(" ");
                displayCustomCalendar(parts[0], parts[1]);
                awaitingDateInput = false;
            } else {
                handleCommand(cmd);
            }
            if (cmd.startsWith("logar ") || cmd.startsWith("registrar ")) {
                const parts = cmd.split(" ");
                lastCommands.push(`${parts[0]} ${parts[1]} *******`);
            } else { lastCommands.push(cmd); }
            commandIndex = lastCommands.length;
        }
    });
